<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COHERENCE</title>
    <style>
       @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=IBM+Plex+Mono:wght@400;600&display=swap');

:root {
  /* shared “hub-ish” palette */
  --earth-deep: #1a1816;
  --stone-dark: #2a2724;
  --stone: #3a3530;
  --sand: #c4b8a5;
  --paper: #e7dfcf;
  --dawn: #a64c3c;

  --text-dim: rgba(196, 184, 165, 0.65);
  --text-mid: rgba(196, 184, 165, 0.82);
  --text-bright: rgba(231, 223, 207, 0.95);

  --panel: rgba(26, 24, 22, 0.62);
  --panel-strong: rgba(26, 24, 22, 0.78);
  --border: rgba(90, 85, 80, 0.35);
  --border-strong: rgba(196, 184, 165, 0.22);

  /* Coherence-specific accents (kept, but softened) */
  --signal-green: #79bfa1;
  --signal-amber: #caa86a;
  --signal-red: #c26a6a;

  --distortion: #b06a95;
  --anchor: #7fb6c2;
  --threshold: #c98b5b;
  --gold: #d7c07a;

  --shadow: rgba(0, 0, 0, 0.35);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

body {
  font-family: 'IBM Plex Mono', monospace;
  color: var(--text-bright);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.25rem;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 15%, rgba(166, 76, 60, 0.12) 0%, transparent 40%),
    radial-gradient(circle at 80% 25%, rgba(196, 184, 165, 0.10) 0%, transparent 45%),
    radial-gradient(circle at 55% 85%, rgba(121, 191, 161, 0.08) 0%, transparent 45%),
    linear-gradient(180deg, var(--earth-deep), #141210 70%, #11100f);
  position: relative;
}

/* subtle noise texture (kept, but gentler than the sci-fi overlay) */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.20;
  background-image:
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.10'/%3E%3C/svg%3E");
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  width: 100%;
  max-width: 900px;
}

header {
  margin-bottom: 1.25rem;
  animation: fadeIn 1.2s ease-out 0.1s both;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  letter-spacing: 0.18rem;
  font-size: clamp(2.0rem, 5vw, 3.0rem);
  color: var(--paper);
  text-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.subtitle {
  margin-top: 0.35rem;
  font-size: clamp(0.75rem, 1.8vw, 0.95rem);
  color: var(--text-dim);
  letter-spacing: 0.12rem;
  text-transform: lowercase;
  font-style: italic;
}

#game-container {
  display: inline-block;
  width: min(92vw, 660px);
  padding: 1.25rem;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow:
    0 18px 60px rgba(0, 0, 0, 0.45),
    inset 0 1px 0 rgba(255, 255, 255, 0.04);
  animation: fadeIn 1.1s ease-out 0.25s both;
}

#grid {
  position: relative; /* anchors the player layer + floating numbers */
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  gap: 2px;
  padding: 0.9rem;
  width: min(90vw, 62vh, 600px);
  height: min(90vw, 62vh, 600px);
  background: rgba(0,0,0,0.18);
  border: 1px solid var(--border-strong);
  border-radius: 14px;
  box-shadow:
    inset 0 0 24px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.03);
}

.cell {
  aspect-ratio: 1;
  border-radius: 6px;
  position: relative;
  transition: transform 0.12s ease, filter 0.2s ease, box-shadow 0.2s ease;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 1px 2px rgba(0,0,0,0.22);
}

/* Tile types - sigil-based aesthetic */
.ground {
  background: rgba(196, 184, 165, 0.06);
  border: 1px solid rgba(196, 184, 165, 0.08);
}

.boundary {
  background: rgba(196, 184, 165, 0.12);
  border: 1px solid rgba(196, 184, 165, 0.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 2px 4px rgba(0,0,0,0.25);
}

/* ===== PLAYER SIGIL ===== */
/* Full diamond with asterisk - the complete signal.
   A dedicated layer that GLIDES between cells instead of teleporting. */
#player {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 5;
  pointer-events: none;
  border-radius: 6px;
  transition: transform 0.11s ease-out;
  will-change: transform;
  background: radial-gradient(circle at 50% 50%, rgba(121,191,161,0.35) 0%, rgba(121,191,161,0.08) 60%, transparent 100%);
  border: 1px solid rgba(121, 191, 161, 0.25);
  box-shadow:
    0 0 20px rgba(121, 191, 161, 0.25),
    0 0 40px rgba(121, 191, 161, 0.10);
  animation: playerPulse 2.4s ease-in-out infinite;
  overflow: visible;
}

#player::before {
  content: '';
  position: absolute;
  top: 15%;
  left: 15%;
  width: 70%;
  height: 70%;
  border: 2px solid rgba(121, 191, 161, 0.9);
  transform: rotate(45deg);
  box-shadow: inset 0 0 8px rgba(121, 191, 161, 0.3);
}

#player::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 60%;
  height: 60%;
  transform: translate(-50%, -50%);
  background:
    linear-gradient(0deg, transparent 45%, rgba(121,191,161,0.8) 48%, rgba(121,191,161,0.8) 52%, transparent 55%),
    linear-gradient(90deg, transparent 45%, rgba(121,191,161,0.8) 48%, rgba(121,191,161,0.8) 52%, transparent 55%),
    linear-gradient(45deg, transparent 45%, rgba(121,191,161,0.5) 48%, rgba(121,191,161,0.5) 52%, transparent 55%),
    linear-gradient(-45deg, transparent 45%, rgba(121,191,161,0.5) 48%, rgba(121,191,161,0.5) 52%, transparent 55%);
}

/* ===== DISTORTION SIGIL ===== */
/* Broken/fragmented diamond - corrupted signal */
.distortion {
  background: radial-gradient(circle at 50% 50%, rgba(176, 106, 149, 0.30) 0%, rgba(176, 106, 149, 0.08) 60%, transparent 100%);
  border: 1px solid rgba(176, 106, 149, 0.20);
  box-shadow:
    0 0 15px rgba(176, 106, 149, 0.20),
    0 0 30px rgba(176, 106, 149, 0.08);
  animation: distortionFlicker 3.5s ease-in-out infinite;
}

.distortion::before {
  content: '';
  position: absolute;
  top: 20%;
  left: 20%;
  width: 60%;
  height: 60%;
  border: 2px solid rgba(176, 106, 149, 0.7);
  border-right-color: transparent;
  border-bottom-color: transparent;
  transform: rotate(45deg);
}

.distortion::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 50%;
  height: 50%;
  transform: translate(-50%, -50%);
  background:
    linear-gradient(135deg, transparent 40%, rgba(176,106,149,0.6) 48%, transparent 52%),
    linear-gradient(-135deg, transparent 40%, rgba(176,106,149,0.4) 48%, transparent 52%);
}

/* ===== ANCHOR SIGIL ===== */
/* Diamond with inner circle - stability/grounding */
.anchor {
  background: radial-gradient(circle at 50% 50%, rgba(127, 182, 194, 0.35) 0%, rgba(127, 182, 194, 0.08) 60%, transparent 100%);
  border: 1px solid rgba(127, 182, 194, 0.25);
  box-shadow:
    0 0 18px rgba(127, 182, 194, 0.22),
    0 0 35px rgba(127, 182, 194, 0.08);
  animation: anchorGlow 2.6s ease-in-out infinite;
}

.anchor::before {
  content: '';
  position: absolute;
  top: 18%;
  left: 18%;
  width: 64%;
  height: 64%;
  border: 2px solid rgba(127, 182, 194, 0.8);
  transform: rotate(45deg);
}

.anchor::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 35%;
  height: 35%;
  transform: translate(-50%, -50%);
  border: 2px solid rgba(127, 182, 194, 0.9);
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(127, 182, 194, 0.4);
}

/* ===== THRESHOLD SIGIL ===== */
/* Horizontal gateway line - point of no return */
.threshold {
  background: linear-gradient(90deg, transparent 0%, rgba(201, 139, 91, 0.15) 30%, rgba(201, 139, 91, 0.15) 70%, transparent 100%);
  border: 1px solid rgba(201, 139, 91, 0.20);
  box-shadow:
    0 0 12px rgba(201, 139, 91, 0.15),
    inset 0 0 8px rgba(201, 139, 91, 0.08);
}

.threshold::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 10%;
  width: 80%;
  height: 2px;
  background: rgba(201, 139, 91, 0.8);
  transform: translateY(-50%);
  box-shadow: 0 0 8px rgba(201, 139, 91, 0.5);
}

.threshold::after {
  content: '';
  position: absolute;
  top: 25%;
  left: 35%;
  width: 30%;
  height: 50%;
  border: 1px solid rgba(201, 139, 91, 0.5);
  border-top: none;
  border-bottom: none;
}

/* ===== ARTIFACT SIGIL ===== */
/* Elaborate diamond with full star - power/transformation */
.artifact {
  background: radial-gradient(circle at 50% 50%, rgba(215, 192, 122, 0.40) 0%, rgba(215, 192, 122, 0.12) 50%, transparent 100%);
  border: 1px solid rgba(215, 192, 122, 0.30);
  box-shadow:
    0 0 22px rgba(215, 192, 122, 0.30),
    0 0 45px rgba(215, 192, 122, 0.12);
  animation: artifactSparkle 2.8s ease-in-out infinite;
}

.artifact::before {
  content: '';
  position: absolute;
  top: 12%;
  left: 12%;
  width: 76%;
  height: 76%;
  border: 2px solid rgba(215, 192, 122, 0.9);
  transform: rotate(45deg);
  box-shadow:
    inset 0 0 10px rgba(215, 192, 122, 0.25),
    0 0 8px rgba(215, 192, 122, 0.3);
}

.artifact::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 70%;
  height: 70%;
  transform: translate(-50%, -50%);
  background:
    linear-gradient(0deg, transparent 42%, rgba(215,192,122,0.9) 47%, rgba(215,192,122,0.9) 53%, transparent 58%),
    linear-gradient(90deg, transparent 42%, rgba(215,192,122,0.9) 47%, rgba(215,192,122,0.9) 53%, transparent 58%),
    linear-gradient(45deg, transparent 42%, rgba(215,192,122,0.6) 47%, rgba(215,192,122,0.6) 53%, transparent 58%),
    linear-gradient(-45deg, transparent 42%, rgba(215,192,122,0.6) 47%, rgba(215,192,122,0.6) 53%, transparent 58%);
}

/* ===== EXIT SIGIL ===== */
/* Open diamond frame - portal/escape */
.exit {
  background: radial-gradient(circle at 50% 50%, rgba(121,191,161,0.25) 0%, rgba(121,191,161,0.05) 60%, transparent 100%);
  border: 1px solid rgba(121, 191, 161, 0.20);
  box-shadow:
    0 0 18px rgba(121,191,161,0.18),
    0 0 35px rgba(121,191,161,0.08);
  animation: exitPulse 3.2s ease-in-out infinite;
}

.exit::before {
  content: '';
  position: absolute;
  top: 15%;
  left: 15%;
  width: 70%;
  height: 70%;
  border: 2px solid rgba(121, 191, 161, 0.7);
  transform: rotate(45deg);
}

.exit::after {
  content: '';
  position: absolute;
  top: 28%;
  left: 28%;
  width: 44%;
  height: 44%;
  border: 1px solid rgba(121, 191, 161, 0.5);
  transform: rotate(45deg);
  animation: exitInnerPulse 3.2s ease-in-out infinite;
}

#status {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  width: 100%;
  max-width: 600px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: clamp(0.75rem, 1.6vw, 0.95rem);
  letter-spacing: 0.14rem;
  text-align: center;
}

.status-line { margin: 0.25rem 0; }

.coh-value { font-weight: 600; transition: color 0.3s ease; }
.coh-high { color: var(--signal-green); }
.coh-medium { color: var(--signal-amber); }
.coh-low { color: var(--signal-red); }

.state-stable { color: var(--signal-green); }
.state-searching { color: var(--signal-amber); }
.state-altered { color: var(--anchor); }
.state-critical { color: var(--signal-red); animation: textPulse 1.4s ease-in-out infinite; }

.instructions {
  margin-top: 1rem;
  font-size: clamp(0.6rem, 1.4vw, 0.8rem);
  color: var(--text-dim);
  letter-spacing: 0.1rem;
  line-height: 1.6;
  text-transform: lowercase;
  font-style: italic;
  animation: fadeIn 1.2s ease-out 0.55s both;
}

/* Mobile controls */
#mobile-controls {
  display: none;
  margin: 1rem auto 0;
  width: 180px;
  height: 180px;
  position: relative;
  z-index: 2;
}

.control-btn {
  position: absolute;
  width: 56px;
  height: 56px;
  border-radius: 14px;
  border: 1px solid rgba(196, 184, 165, 0.25);
  background: rgba(26, 24, 22, 0.55);
  color: var(--text-mid);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 1.2rem;
  cursor: pointer;
  transition: transform 0.12s ease, border-color 0.25s ease, color 0.25s ease, background 0.25s ease;
  box-shadow: 0 10px 22px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
}

.control-btn:hover {
  transform: translateY(-1px);
  border-color: rgba(231, 223, 207, 0.25);
  color: var(--text-bright);
  background: rgba(26, 24, 22, 0.70);
}

.control-btn:active { transform: translateY(0); }

.control-btn:nth-child(1) { left: 62px; top: 0; }
.control-btn:nth-child(2) { left: 0; top: 62px; }
.control-btn:nth-child(3) { right: 0; top: 62px; }
.control-btn:nth-child(4) { left: 62px; bottom: 0; }

/* Modal + audio init share styles */
#modal,
#audio-init {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  z-index: 2000;
  background: rgba(20, 18, 16, 0.90);
}

#modal.active { display: flex; }
#audio-init { display: flex; z-index: 3000; }
#audio-init.hidden { display: none; }

.modal-content {
  width: min(92vw, 520px);
  padding: 1.75rem 1.5rem;
  background: rgba(26, 24, 22, 0.82);
  border: 1px solid rgba(196, 184, 165, 0.22);
  border-radius: 18px;
  box-shadow:
    0 22px 70px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.04);
  animation: fadeIn 0.35s ease-out;
  text-align: center;
}

.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  letter-spacing: 0.12rem;
  font-size: clamp(1.2rem, 3vw, 1.6rem);
  color: var(--paper);
  margin-bottom: 0.65rem;
}

.modal-text {
  color: var(--text-mid);
  font-size: 0.9rem;
  line-height: 1.6;
  margin-bottom: 1.25rem;
}

.modal-buttons {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  flex-wrap: wrap;
}

/* Any buttons inside modals (including START) */
button,
.modal-buttons button {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  letter-spacing: 0.12rem;
  text-transform: lowercase;
  padding: 0.6rem 1.25rem;
  border-radius: 999px;
  border: 1px solid rgba(196, 184, 165, 0.26);
  background: transparent;
  color: var(--text-mid);
  cursor: pointer;
  transition: transform 0.12s ease, border-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
}

button:hover,
.modal-buttons button:hover {
  transform: translateY(-1px);
  border-color: rgba(231, 223, 207, 0.30);
  color: var(--text-bright);
  box-shadow: 0 10px 26px rgba(0,0,0,0.35);
  background: rgba(231, 223, 207, 0.04);
}

button:active,
.modal-buttons button:active { transform: translateY(0); }

/* Glitch effect (kept, but less violent) */
.glitch { animation: glitchShake 0.22s ease-in-out; }

@keyframes glitchShake {
  0%, 100% { transform: translate(0, 0); filter: none; }
  25% { transform: translate(-1px, 1px); filter: saturate(1.05); }
  50% { transform: translate(1px, -1px); filter: saturate(1.08); }
  75% { transform: translate(-1px, -1px); filter: saturate(1.05); }
}

@keyframes playerPulse {
  0%, 100% { filter: brightness(1); box-shadow: 0 0 20px rgba(121, 191, 161, 0.25), 0 0 40px rgba(121, 191, 161, 0.10); }
  50% { filter: brightness(1.1); box-shadow: 0 0 25px rgba(121, 191, 161, 0.35), 0 0 50px rgba(121, 191, 161, 0.15); }
}

@keyframes distortionFlicker {
  0%, 100% { opacity: 0.95; transform: rotate(0deg); }
  25% { opacity: 0.85; transform: rotate(0.5deg); }
  50% { opacity: 0.90; transform: rotate(-0.5deg); }
  75% { opacity: 0.88; transform: rotate(0.3deg); }
}

@keyframes anchorGlow {
  0%, 100% { filter: brightness(1); box-shadow: 0 0 18px rgba(127, 182, 194, 0.22), 0 0 35px rgba(127, 182, 194, 0.08); }
  50% { filter: brightness(1.12); box-shadow: 0 0 22px rgba(127, 182, 194, 0.30), 0 0 45px rgba(127, 182, 194, 0.12); }
}

@keyframes artifactSparkle {
  0%, 100% { filter: brightness(1); box-shadow: 0 0 22px rgba(215, 192, 122, 0.30), 0 0 45px rgba(215, 192, 122, 0.12); }
  50% { filter: brightness(1.15); box-shadow: 0 0 28px rgba(215, 192, 122, 0.45), 0 0 55px rgba(215, 192, 122, 0.18); }
}

@keyframes exitPulse {
  0%, 100% { box-shadow: 0 0 18px rgba(121,191,161,0.18), 0 0 35px rgba(121,191,161,0.08); }
  50% { box-shadow: 0 0 24px rgba(121,191,161,0.28), 0 0 45px rgba(121,191,161,0.12); }
}

@keyframes exitInnerPulse {
  0%, 100% { opacity: 0.5; transform: rotate(45deg) scale(1); }
  50% { opacity: 0.8; transform: rotate(45deg) scale(1.08); }
}

@keyframes textPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.65; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== FEEDBACK LAYER ===== */

/* Floating drain/gain numbers */
.float-num {
  position: absolute;
  z-index: 10;
  pointer-events: none;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: 0.05rem;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
  animation: floatUp 1s ease-out forwards;
}
.float-num.drain { color: var(--distortion); }
.float-num.gain  { color: var(--anchor); }
.float-num.gold  { color: var(--gold); }

@keyframes floatUp {
  0%   { opacity: 0; transform: translate(-50%, 6px); }
  15%  { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -30px); }
}

/* Coherence bar — reads peripherally while your eyes stay on the board */
#coh-bar {
  width: 100%;
  max-width: 600px;
  height: 5px;
  margin: 0 auto 0.7rem;
  background: rgba(0, 0, 0, 0.35);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

#coh-fill {
  height: 100%;
  width: 100%;
  border-radius: 4px;
  transition: width 0.25s ease, background 0.3s ease;
}
#coh-fill.high   { background: var(--signal-green); }
#coh-fill.medium { background: var(--signal-amber); }
#coh-fill.low    { background: var(--signal-red); }

#coh-bar.hit { animation: barHit 0.35s ease; }
@keyframes barHit {
  0%   { box-shadow: 0 0 0 rgba(194, 106, 106, 0); }
  40%  { box-shadow: 0 0 14px rgba(194, 106, 106, 0.7); }
  100% { box-shadow: 0 0 0 rgba(194, 106, 106, 0); }
}

/* Carried artifact effect reminder */
#carry-effect {
  font-size: 0.72em;
  color: var(--text-dim);
  font-style: italic;
  letter-spacing: 0.06rem;
  min-height: 1.2em;
}

/* Watch the coral grow: new distortions scale in */
.cell.spawn { animation: distortionSpawn 0.6s ease-out; }
@keyframes distortionSpawn {
  0%   { transform: scale(0.2); filter: brightness(2); }
  60%  { transform: scale(1.15); }
  100% { transform: scale(1); filter: brightness(1); }
}

/* Threshold crossing — the one irreversible moment */
.cell.flare { animation: thresholdFlare 0.8s ease-out; }
@keyframes thresholdFlare {
  0%   { filter: brightness(1); box-shadow: 0 0 0 rgba(201, 139, 91, 0); }
  30%  { filter: brightness(2.2); box-shadow: 0 0 22px rgba(201, 139, 91, 0.8); }
  100% { filter: brightness(1); box-shadow: 0 0 0 rgba(201, 139, 91, 0); }
}
#grid.crossing { animation: crossingPulse 0.8s ease-out; }
@keyframes crossingPulse {
  0%   { filter: none; }
  35%  { filter: saturate(0.55) brightness(0.85); }
  100% { filter: none; }
}

/* Anchor consumption burst */
.burst-ring {
  position: absolute;
  z-index: 9;
  width: 14px;
  height: 14px;
  border: 2px solid var(--anchor);
  border-radius: 50%;
  pointer-events: none;
  animation: burstRing 0.6s ease-out forwards;
}
@keyframes burstRing {
  0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0.9; }
  100% { transform: translate(-50%, -50%) scale(4);   opacity: 0; }
}

/* The board participates in the ending */
#grid.collapse .cell { animation: cellCollapse 0.9s ease-in forwards; }
@keyframes cellCollapse {
  to { filter: saturate(0.15) brightness(0.4); }
}
#grid.transmit .cell { animation: cellTransmit 1.1s ease-out forwards; }
@keyframes cellTransmit {
  30% { filter: brightness(1.7); }
  100% { filter: brightness(1.15); }
}

/* Fresh-run entrance */
.cell.enter { animation: cellEnter 0.45s ease-out backwards; }
@keyframes cellEnter {
  from { opacity: 0; transform: scale(0.82); }
}

/* Board feels touchable */
@media (hover: hover) {
  .cell:hover { filter: brightness(1.18); }
}

/* ===== REDUCED MOTION ===== */
@media (prefers-reduced-motion: reduce) {
  .cell, .cell::before, .cell::after,
  #player, #player::before, #player::after,
  #grid, .glitch {
    animation: none !important;
  }
  #player { transition: none !important; }
  .float-num { animation: floatUpReduced 1s ease-out forwards; }
  @keyframes floatUpReduced {
    0%   { opacity: 0; transform: translate(-50%, 0); }
    15%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, 0); }
  }
}

/* Responsive: show d-pad on small screens */
@media (max-width: 820px) {
  #mobile-controls { display: block; }
  body { padding: 1rem; }
  #game-container { padding: 1rem; border-radius: 16px; }
  #grid { border-radius: 12px; padding: 0.75rem; }
}
    
        /* Back to the collection */
        .hub-link {
            position: fixed;
            top: 14px;
            left: 16px;
            z-index: 20;
            font-family: 'IBM Plex Mono', monospace;
            color: rgba(196, 184, 165, 0.6);
            text-decoration: none;
            font-size: 0.72rem;
            letter-spacing: 0.14rem;
            transition: color 0.25s ease;
        }
        .hub-link:hover { color: rgba(231, 223, 207, 0.95); }
    </style>
</head>
<body>
    <a class="hub-link" href="index.html">&larr; the hub</a>
    <!-- Audio init overlay -->
    <div id="audio-init">
        <div class="modal-content">
            <div class="modal-title">INITIALIZE SIGNAL</div>
            <div class="modal-text">Press to begin transmission</div>
            <button id="init-audio-btn" onclick="initAudio()" autofocus>START</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>COHERENCE</h1>
            <div class="subtitle">Signal Decay Protocol</div>
        </header>
        
        <div id="game-container">
            <div id="grid"></div>
            <div id="status">
                <div id="coh-bar"><div id="coh-fill" class="high"></div></div>
                <div class="status-line">
                    COH: <span id="coh-value" class="coh-value coh-high">30</span>
                </div>
                <div class="status-line">
                    STATE: <span id="state-value" class="state-stable">STABLE</span>
                </div>
                <div class="status-line">
                    CARRY: <span id="carry-value">NONE</span>
                </div>
                <div class="status-line" id="carry-effect"></div>
                <div class="status-line">
                    RECOVERED: <span id="found-value">0/4</span>
                </div>
            </div>
        </div>
        
        <div id="mobile-controls">
            <button class="control-btn" onclick="movePlayer(0, -1)">↑</button>
            <button class="control-btn" onclick="movePlayer(-1, 0)">←</button>
            <button class="control-btn" onclick="movePlayer(1, 0)">→</button>
            <button class="control-btn" onclick="movePlayer(0, 1)">↓</button>
        </div>
        
        <div class="instructions">
            ARROW KEYS OR WASD TO MOVE • ARTIFACTS UNLOCK THE EXIT • EACH ONE RAISES THE TRANSMISSION • ESCAPE BEFORE DISSOLUTION
        </div>
    </div>
    
    <div id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-text" id="modal-text"></div>
            <div class="modal-buttons" id="modal-buttons"></div>
        </div>
    </div>

    <!-- Audio elements -->
    <audio id="music-main" loop>
        <source src="music/coherence.mp3" type="audio/mpeg">
    </audio>
    <audio id="music-threshold" loop>
        <source src="music/coherence-threshold.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        // Audio system
        const audioMain = document.getElementById('music-main');
        const audioThreshold = document.getElementById('music-threshold');
        let audioInitialized = false;
        let audioContext = null;

        function initAudio() {
            audioMain.volume = 0.5;
            audioThreshold.volume = 0.5;

            // Initialize Web Audio API context for sound effects
            audioContext = new (window.AudioContext || window.webkitAudioContext)();

            audioMain.play().then(() => {
                audioInitialized = true;
                document.getElementById('audio-init').classList.add('hidden');
            }).catch(err => {
                console.log('Audio autoplay prevented:', err);
                audioInitialized = true;
                document.getElementById('audio-init').classList.add('hidden');
            });
        }

        function switchToThresholdMusic() {
            if (!audioInitialized) return;
            audioMain.pause();
            audioThreshold.play().catch(err => console.log('Threshold music error:', err));
        }

        // Procedural sound effects using Web Audio API
        function playSound(type) {
            if (!audioContext) return;

            const now = audioContext.currentTime;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            switch(type) {
                case 'move':
                    // Soft blip for movement
                    oscillator.frequency.setValueAtTime(200, now);
                    oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                    gainNode.gain.setValueAtTime(0.1, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    oscillator.start(now);
                    oscillator.stop(now + 0.05);
                    break;

                case 'artifact':
                    // Ascending chime for artifact pickup
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(400, now);
                    oscillator.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                    oscillator.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    oscillator.start(now);
                    oscillator.stop(now + 0.3);
                    break;

                case 'anchor':
                    // Warm restoration tone
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(300, now);
                    oscillator.frequency.setValueAtTime(400, now + 0.05);
                    oscillator.frequency.setValueAtTime(500, now + 0.1);
                    gainNode.gain.setValueAtTime(0.15, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    oscillator.start(now);
                    oscillator.stop(now + 0.2);
                    break;

                case 'distortion':
                    // Harsh digital noise for distortion damage
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(150, now);
                    oscillator.frequency.exponentialRampToValueAtTime(80, now + 0.15);
                    gainNode.gain.setValueAtTime(0.08, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    oscillator.start(now);
                    oscillator.stop(now + 0.15);
                    break;

                case 'threshold':
                    // Ominous low tone for crossing threshold
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(100, now);
                    oscillator.frequency.exponentialRampToValueAtTime(60, now + 0.4);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    oscillator.start(now);
                    oscillator.stop(now + 0.4);
                    break;

                case 'collision':
                    // Sharp hit for wall collision
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(100, now);
                    gainNode.gain.setValueAtTime(0.15, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                    oscillator.start(now);
                    oscillator.stop(now + 0.08);
                    break;

                case 'exit':
                    // Victory fanfare
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(500, now);
                    oscillator.frequency.setValueAtTime(600, now + 0.1);
                    oscillator.frequency.setValueAtTime(800, now + 0.2);
                    oscillator.frequency.setValueAtTime(1000, now + 0.3);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    oscillator.start(now);
                    oscillator.stop(now + 0.5);
                    break;

                case 'death':
                    // Descending failure tone
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(300, now);
                    oscillator.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    oscillator.start(now);
                    oscillator.stop(now + 0.5);
                    break;
            }
        }

        // Game State
        const gameState = {
            grid: [],
            playerPos: { x: 1, y: 1 },
            coherence: 30,
            belowThreshold: false,
            turnCounter: 0,
            carriedArtifact: null,
            gameOver: false,
            won: false,
            anchorUsed: false,
            thresholdRow: 5,
            hasArtifact: false, // at least one artifact collected (unlocks exit)
            artifactsCollected: 0, // total recovered this run — drives ending tiers
            turnsBelow: 0 // turns since crossing the threshold — spreading escalates
        };
        
        // Artifact definitions
        const artifacts = [
            {
                name: "RESONANCE INVERTER",
                description: "Distortions become Anchors. Anchors become Distortions.",
                cohBonus: 6,
                effect: "invert"
            },
            {
                name: "CLARITY LENS",
                description: "See the pattern, pay the price. +1 drain per turn.",
                cohBonus: 6,
                effect: "clarity"
            },
            {
                name: "SEVERANCE",
                description: "Immune to distortion adjacency. Anchors no longer function.",
                cohBonus: 6,
                effect: "sever"
            },
            {
                name: "TEMPORAL ECHO",
                description: "Every 5th move is free. Time bends around you.",
                cohBonus: 8,
                effect: "echo"
            },
            {
                name: "VOID COMPASS",
                description: "Distortions spread slower. Coherence drain reduced by 1.",
                cohBonus: 5,
                effect: "compass"
            },
            {
                name: "HARMONIC BEACON",
                description: "Anchors restore +15 instead of +10. Attracts distortion faster.",
                cohBonus: 4,
                effect: "beacon"
            }
        ];
        
        // Generate random level
        function generateLevel() {
            const width = 16;
            const height = 16;
            const grid = [];

            // Initialize with boundaries and ground
            for (let y = 0; y < height; y++) {
                grid[y] = [];
                for (let x = 0; x < width; x++) {
                    if (y === 0 || y === height - 1 || x === 0 || x === width - 1) {
                        grid[y][x] = '#'; // Boundary
                    } else {
                        grid[y][x] = '.'; // Ground
                    }
                }
            }

            // Place threshold near middle (row 8 in 16x16 grid)
            const thresholdRow = 8;
            gameState.thresholdRow = thresholdRow;
            for (let x = 1; x < width - 1; x++) {
                grid[thresholdRow][x] = '+';
            }

            // Place player in top-left area (above threshold)
            gameState.playerPos = { x: 1, y: 1 };

            // Place exit in top-right area (above threshold)
            grid[1][width - 2] = 'X';

            // Place 1 artifact above threshold
            const aboveY = Math.floor(Math.random() * (thresholdRow - 2)) + 2; // rows 2-7
            const aboveX = Math.floor(Math.random() * (width - 4)) + 2; // avoid edges
            grid[aboveY][aboveX] = '*';

            // Place 3 artifacts below threshold
            const belowArtifacts = [];
            for (let i = 0; i < 3; i++) {
                let x, y;
                do {
                    y = Math.floor(Math.random() * (height - thresholdRow - 3)) + thresholdRow + 1; // rows 9-14
                    x = Math.floor(Math.random() * (width - 4)) + 2;
                } while (grid[y][x] !== '.' || belowArtifacts.some(a => a.x === x && a.y === y));

                grid[y][x] = '*';
                belowArtifacts.push({ x, y });
            }

            // Place 2-3 anchors below threshold (more anchors for larger grid)
            const anchorCount = Math.floor(Math.random() * 2) + 2; // 2 or 3
            for (let i = 0; i < anchorCount; i++) {
                let x, y;
                do {
                    y = Math.floor(Math.random() * (height - thresholdRow - 3)) + thresholdRow + 1;
                    x = Math.floor(Math.random() * (width - 4)) + 2;
                } while (grid[y][x] !== '.');

                grid[y][x] = 'O';
            }

            // Place 4-6 initial distortions scattered throughout (more for larger grid)
            const distortionCount = Math.floor(Math.random() * 3) + 4; // 4 to 6
            for (let i = 0; i < distortionCount; i++) {
                let x, y;
                do {
                    y = Math.floor(Math.random() * (height - 4)) + 2; // rows 2-14
                    x = Math.floor(Math.random() * (width - 4)) + 2;
                } while (grid[y][x] !== '.' || (y === thresholdRow));

                grid[y][x] = '~';
            }

            return grid;
        }

        // Initialize game
        function initGame() {
            gameState.grid = generateLevel();
            if (!cellEls.length) buildGrid();
            renderGrid(true);
            updateStatus();
        }

        /* === RENDERING: persistent cells + a player layer that glides ===
           Cells are built ONCE. Each turn we only touch cells whose tile
           changed — so idle animations breathe continuously, new
           distortions visibly grow in, and the player physically moves. */

        const TILE_CLASS = {
            '.': 'ground', '#': 'boundary', '~': 'distortion',
            'O': 'anchor', '+': 'threshold', '*': 'artifact', 'X': 'exit'
        };

        let cellEls = [];
        let playerEl = null;

        function buildGrid() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            cellEls = [];
            for (let y = 0; y < 16; y++) {
                cellEls[y] = [];
                for (let x = 0; x < 16; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    gridElement.appendChild(cell);
                    cellEls[y][x] = cell;
                }
            }
            playerEl = document.createElement('div');
            playerEl.id = 'player';
            gridElement.appendChild(playerEl);
        }

        function renderGrid(fresh) {
            for (let y = 0; y < gameState.grid.length; y++) {
                for (let x = 0; x < gameState.grid[y].length; x++) {
                    const cls = ('cell ' + (TILE_CLASS[gameState.grid[y][x]] || '')).trim();
                    const el = cellEls[y][x];
                    if (el._base !== cls) {
                        const wasDistortion = (el._base || '').indexOf('distortion') !== -1;
                        el._base = cls;
                        el.className = cls;
                        // Watch the coral grow: newly-spawned distortions scale in
                        if (!fresh && !wasDistortion && gameState.grid[y][x] === '~') {
                            el.classList.add('spawn');
                            setTimeout(() => el.classList.remove('spawn'), 700);
                        }
                    }
                }
            }
            positionPlayer(fresh);
        }

        function positionPlayer(immediate) {
            if (!playerEl || !cellEls.length) return;
            const row = cellEls[gameState.playerPos.y];
            const cell = row && row[gameState.playerPos.x];
            if (!cell) return;
            playerEl.style.width = cell.offsetWidth + 'px';
            playerEl.style.height = cell.offsetHeight + 'px';
            if (immediate) playerEl.style.transition = 'none';
            playerEl.style.transform = 'translate(' + cell.offsetLeft + 'px,' + cell.offsetTop + 'px)';
            if (immediate) {
                void playerEl.offsetWidth; // flush styles so the next move animates
                playerEl.style.transition = '';
            }
        }

        /* === FEEDBACK EFFECTS === */

        function floatText(text, kind, gx, gy) {
            const row = cellEls[gy];
            const cell = row && row[gx];
            if (!cell) return;
            const el = document.createElement('div');
            el.className = 'float-num ' + (kind || '');
            el.textContent = text;
            el.style.left = (cell.offsetLeft + cell.offsetWidth / 2) + 'px';
            el.style.top = cell.offsetTop + 'px';
            document.getElementById('grid').appendChild(el);
            setTimeout(() => el.remove(), 1100);
        }

        function spawnBurst(gx, gy) {
            const row = cellEls[gy];
            const cell = row && row[gx];
            if (!cell) return;
            const ring = document.createElement('div');
            ring.className = 'burst-ring';
            ring.style.left = (cell.offsetLeft + cell.offsetWidth / 2) + 'px';
            ring.style.top = (cell.offsetTop + cell.offsetHeight / 2) + 'px';
            document.getElementById('grid').appendChild(ring);
            setTimeout(() => ring.remove(), 700);
        }

        function thresholdCrossEffect() {
            const rowY = gameState.thresholdRow;
            for (let x = 0; x < 16; x++) {
                const el = cellEls[rowY] && cellEls[rowY][x];
                if (!el) continue;
                el.classList.add('flare');
                setTimeout(() => el.classList.remove('flare'), 900);
            }
            const grid = document.getElementById('grid');
            grid.classList.add('crossing');
            setTimeout(() => grid.classList.remove('crossing'), 900);
        }

        function boardEndEffect(win) {
            const grid = document.getElementById('grid');
            grid.classList.add(win ? 'transmit' : 'collapse');
            for (let y = 0; y < cellEls.length; y++) {
                for (let x = 0; x < cellEls[y].length; x++) {
                    cellEls[y][x].style.animationDelay = (Math.random() * 0.45).toFixed(2) + 's';
                }
            }
        }

        function gridEntrance() {
            for (let y = 0; y < cellEls.length; y++) {
                for (let x = 0; x < cellEls[y].length; x++) {
                    const el = cellEls[y][x];
                    el.classList.add('enter');
                    el.style.animationDelay = ((x + y) * 12) + 'ms';
                }
            }
            setTimeout(() => {
                for (let y = 0; y < cellEls.length; y++) {
                    for (let x = 0; x < cellEls[y].length; x++) {
                        cellEls[y][x].classList.remove('enter');
                        cellEls[y][x].style.animationDelay = '';
                    }
                }
            }, 900);
        }
        
        // Update status line
        function updateStatus() {
            const cohValue = document.getElementById('coh-value');
            const stateValue = document.getElementById('state-value');
            const carryValue = document.getElementById('carry-value');
            
            // Update coherence
            cohValue.textContent = gameState.coherence;
            cohValue.className = 'coh-value';
            if (gameState.coherence >= 15) {
                cohValue.classList.add('coh-high');
            } else if (gameState.coherence >= 8) {
                cohValue.classList.add('coh-medium');
            } else {
                cohValue.classList.add('coh-low');
            }
            
            // Update state
            let state = 'STABLE';
            let stateClass = 'state-stable';
            
            if (gameState.coherence < 5) {
                state = 'CRITICAL';
                stateClass = 'state-critical';
            } else if (gameState.carriedArtifact) {
                state = 'ALTERED';
                stateClass = 'state-altered';
            } else if (gameState.belowThreshold) {
                state = 'SEARCHING';
                stateClass = 'state-searching';
            }
            
            stateValue.textContent = state;
            stateValue.className = stateClass;
            
            // Update carried item + its effect reminder
            carryValue.textContent = gameState.carriedArtifact ? gameState.carriedArtifact.name : 'NONE';
            const effectEl = document.getElementById('carry-effect');
            if (effectEl) {
                effectEl.textContent = gameState.carriedArtifact ? gameState.carriedArtifact.description.toLowerCase() : '';
            }

            // Update artifacts recovered
            document.getElementById('found-value').textContent = gameState.artifactsCollected + '/4';

            // Coherence bar — pulses when you take a real hit
            const fill = document.getElementById('coh-fill');
            if (fill) {
                fill.style.width = Math.max(0, Math.min(100, (gameState.coherence / 30) * 100)) + '%';
                fill.className = gameState.coherence >= 15 ? 'high' : gameState.coherence >= 8 ? 'medium' : 'low';
                if (gameState.coherence < lastCoherence - 1) {
                    const bar = document.getElementById('coh-bar');
                    bar.classList.remove('hit');
                    void bar.offsetWidth;
                    bar.classList.add('hit');
                }
                lastCoherence = gameState.coherence;
            }
        }

        let lastCoherence = 30;
        
        // Handle movement
        function movePlayer(dx, dy) {
            if (gameState.gameOver) return;
            
            const newX = gameState.playerPos.x + dx;
            const newY = gameState.playerPos.y + dy;
            
            // Check boundaries
            if (gameState.grid[newY][newX] === '#') {
                // Glitch effect on collision
                playSound('collision');
                document.getElementById('grid').classList.add('glitch');
                setTimeout(() => {
                    document.getElementById('grid').classList.remove('glitch');
                }, 300);
                return;
            }

            // Move player
            gameState.playerPos.x = newX;
            gameState.playerPos.y = newY;

            // Play movement sound
            playSound('move');

            // Process turn
            processTurn();
        }
        
        // Process a game turn
        function processTurn() {
            gameState.turnCounter++;

            // Base movement cost
            let cohCost = 1;

            // Clarity lens effect: +1 drain per turn
            if (gameState.carriedArtifact && gameState.carriedArtifact.effect === 'clarity') {
                cohCost += 1;
            }

            // Temporal Echo effect: Every 5th move is free
            if (gameState.carriedArtifact && gameState.carriedArtifact.effect === 'echo') {
                if (gameState.turnCounter % 5 === 0) {
                    cohCost = 0;
                }
            }

            gameState.coherence -= cohCost;
            
            // Check current tile
            const currentTile = gameState.grid[gameState.playerPos.y][gameState.playerPos.x];
            
            // Exit check - REQUIRES ARTIFACT
            if (currentTile === 'X') {
                if (!gameState.hasArtifact) {
                    showMessage('EXIT LOCKED', 'ARTIFACT REQUIRED TO UNLOCK TRANSMISSION', false);
                    return;
                }
                showExitPrompt();
                return;
            }
            
            // Anchor check
            if (currentTile === 'O' && !gameState.anchorUsed) {
                if (!gameState.carriedArtifact || gameState.carriedArtifact.effect !== 'sever') {
                    const invert = gameState.carriedArtifact && gameState.carriedArtifact.effect === 'invert';
                    if (!invert) {
                        // Harmonic Beacon: +15 instead of +10
                        const anchorBonus = (gameState.carriedArtifact && gameState.carriedArtifact.effect === 'beacon') ? 15 : 10;
                        gameState.coherence += anchorBonus;
                        gameState.grid[gameState.playerPos.y][gameState.playerPos.x] = '.';
                        playSound('anchor');
                        // No pop-up — just a burst and a floating number
                        spawnBurst(gameState.playerPos.x, gameState.playerPos.y);
                        floatText('+' + anchorBonus, 'gain', gameState.playerPos.x, gameState.playerPos.y);
                    }
                }
                // Severance: anchor doesn't work (no message)
            }
            
            // Artifact pickup check
            if (currentTile === '*') {
                handleArtifactPickup();
                return;
            }
            
            // Threshold crossing check
            if (currentTile === '+' && !gameState.belowThreshold) {
                gameState.belowThreshold = true;
                playSound('threshold');
                switchToThresholdMusic();
                thresholdCrossEffect(); // the one irreversible moment gets a moment
            }
            
            // Distortion adjacency/standing check
            checkDistortionDrain();
            
            // Post-threshold spreading — escalates the longer you've pushed:
            // every 3 turns at first, every 2 after ~8 bars of overstaying
            if (gameState.belowThreshold) {
                gameState.turnsBelow++;
                const interval = gameState.turnsBelow > 24 ? 2 : 3;
                if (gameState.turnCounter % interval === 0) {
                    spreadDistortions();
                }
            }
            
            // Coherence check
            if (gameState.coherence <= 0) {
                loseGame();
                return;
            }
            
            renderGrid();
            updateStatus();
        }
        
        // Check for distortion drain
        function checkDistortionDrain() {
            const px = gameState.playerPos.x;
            const py = gameState.playerPos.y;
            const currentTile = gameState.grid[py][px];

            // If carrying severance artifact, immune to distortion
            if (gameState.carriedArtifact && gameState.carriedArtifact.effect === 'sever') {
                return;
            }

            const invert = gameState.carriedArtifact && gameState.carriedArtifact.effect === 'invert';
            const hasCompass = gameState.carriedArtifact && gameState.carriedArtifact.effect === 'compass';

            // Standing on distortion
            if (currentTile === '~') {
                let drain = 2;
                // Void Compass: reduce drain by 1
                if (hasCompass && !invert) {
                    drain = 1;
                }

                if (!invert) {
                    gameState.coherence -= drain;
                    playSound('distortion');
                    floatText('-' + drain, 'drain', px, py);
                } else {
                    gameState.coherence += 2; // Inverted: distortion heals
                    floatText('+2', 'gain', px, py);
                }
                return;
            }

            // Check adjacent tiles (cardinal only)
            const adjacent = [
                {x: px-1, y: py},
                {x: px+1, y: py},
                {x: px, y: py-1},
                {x: px, y: py+1}
            ];

            for (let pos of adjacent) {
                if (pos.y >= 0 && pos.y < gameState.grid.length &&
                    pos.x >= 0 && pos.x < gameState.grid[pos.y].length) {
                    if (gameState.grid[pos.y][pos.x] === '~') {
                        let drain = 1;
                        // Void Compass: reduce drain by 1 (to 0 for adjacency)
                        if (hasCompass && !invert) {
                            drain = 0;
                        }

                        if (!invert) {
                            gameState.coherence -= drain;
                            if (drain > 0) floatText('-' + drain, 'drain', px, py);
                        } else {
                            gameState.coherence += 1; // Inverted: adjacency heals
                            floatText('+1', 'gain', px, py);
                        }
                        return; // Only drain once even if multiple adjacent
                    }
                }
            }
        }
        
        // Count how many distortion neighbors a tile has
        function countDistortedNeighbors(x, y) {
            let count = 0;
            const neighbors = [
                {x: x - 1, y: y},
                {x: x + 1, y: y},
                {x: x, y: y - 1},
                {x: x, y: y + 1}
            ];

            for (let pos of neighbors) {
                if (pos.y >= 0 && pos.y < gameState.grid.length &&
                    pos.x >= 0 && pos.x < gameState.grid[pos.y].length) {
                    if (gameState.grid[pos.y][pos.x] === '~') {
                        count++;
                    }
                }
            }

            return count;
        }

        // Spread distortions using "Coral Growth" algorithm
        function spreadDistortions() {
            // Get spread rate based on artifacts
            let spreadCount = 1; // Default: one spread per cycle

            // Deep overstay: the world frays faster the longer you push
            if (gameState.turnsBelow > 48) {
                spreadCount++;
            }

            // Harmonic Beacon: distortions spread faster (2 per cycle)
            if (gameState.carriedArtifact && gameState.carriedArtifact.effect === 'beacon') {
                spreadCount = 2;
            }

            // Void Compass: distortions spread slower (1 every 2 cycles)
            if (gameState.carriedArtifact && gameState.carriedArtifact.effect === 'compass') {
                if (gameState.turnCounter % 6 !== 0) {
                    return; // Skip spreading this cycle
                }
            }

            // Find all potential growth candidates
            const candidates = [];

            for (let y = 0; y < gameState.grid.length; y++) {
                for (let x = 0; x < gameState.grid[y].length; x++) {
                    if (gameState.grid[y][x] === '~') {
                        // Check all neighbors of this distortion
                        const neighbors = [
                            {x: x - 1, y: y},
                            {x: x + 1, y: y},
                            {x: x, y: y - 1},
                            {x: x, y: y + 1}
                        ];

                        for (let neighbor of neighbors) {
                            const nx = neighbor.x;
                            const ny = neighbor.y;

                            // Check if neighbor is valid and empty
                            if (ny >= 0 && ny < gameState.grid.length &&
                                nx >= 0 && nx < gameState.grid[ny].length &&
                                gameState.grid[ny][nx] === '.') {

                                // Apply Coral Growth Rule: only allow spread if target has < 2 distortion neighbors
                                const neighborCount = countDistortedNeighbors(nx, ny);

                                if (neighborCount < 2) {
                                    // This preserves navigable paths
                                    candidates.push({x: nx, y: ny, neighborCount: neighborCount});
                                }
                            }
                        }
                    }
                }
            }

            // Execute spreads (one or more based on artifact effects)
            for (let i = 0; i < spreadCount && candidates.length > 0; i++) {
                // Pick a random valid candidate
                const chosenIndex = Math.floor(Math.random() * candidates.length);
                const chosen = candidates[chosenIndex];

                gameState.grid[chosen.y][chosen.x] = '~';

                // Remove this candidate to avoid duplicate spreads
                candidates.splice(chosenIndex, 1);
            }
        }
        
        // Handle artifact pickup
        function handleArtifactPickup() {
            // Pick random artifact
            const artifact = artifacts[Math.floor(Math.random() * artifacts.length)];
            
            showArtifactPrompt(artifact);
        }
        
        // Show artifact pickup prompt
        function showArtifactPrompt(artifact) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const text = document.getElementById('modal-text');
            const buttons = document.getElementById('modal-buttons');

            // The relief of each artifact fades — depth must cost, not pay
            const prospectiveBonus = Math.max(0, artifact.cohBonus - 3 * gameState.artifactsCollected);
            const fadeNote = prospectiveBonus < artifact.cohBonus
                ? '<br><em>the relief fades with each one</em>'
                : '';

            title.textContent = `ARTIFACT: ${artifact.name}`;
            text.innerHTML = `
                ${artifact.description}<br><br>
                <strong>IMMEDIATE: +${prospectiveBonus} COHERENCE</strong>${fadeNote}
            `;

            let buttonHTML = '';

            // If player already has an artifact, show only trade/decline options
            if (gameState.carriedArtifact) {
                buttonHTML = `<button class="danger" onclick="tradeArtifact(${artifacts.indexOf(artifact)})" id="modal-primary-btn">TRADE</button>`;
                buttonHTML += `<button class="secondary" onclick="declineArtifact()" id="modal-secondary-btn">DECLINE</button>`;
            } else {
                // First artifact: show accept/decline
                buttonHTML = `<button onclick="acceptArtifact(${artifacts.indexOf(artifact)})" id="modal-primary-btn">ACCEPT</button>`;
                buttonHTML += `<button class="secondary" onclick="declineArtifact()" id="modal-secondary-btn">DECLINE</button>`;
            }

            buttons.innerHTML = buttonHTML;
            modal.classList.add('active');

            // Focus first button
            setTimeout(() => {
                document.getElementById('modal-primary-btn').focus();
            }, 100);
        }
        
        // Accept artifact
        function acceptArtifact(index) {
            const artifact = artifacts[index];

            if (gameState.carriedArtifact) {
                // Can't accept if already carrying
                return;
            }

            gameState.carriedArtifact = artifact;
            gameState.hasArtifact = true; // Mark that player has collected an artifact
            const bonus = Math.max(0, artifact.cohBonus - 3 * gameState.artifactsCollected);
            gameState.artifactsCollected++;
            gameState.coherence += bonus;
            gameState.grid[gameState.playerPos.y][gameState.playerPos.x] = '.';

            playSound('artifact');
            document.getElementById('modal').classList.remove('active');
            if (bonus > 0) floatText('+' + bonus, 'gold', gameState.playerPos.x, gameState.playerPos.y);

            renderGrid();
            updateStatus();
        }

        // Trade artifact
        function tradeArtifact(index) {
            const newArtifact = artifacts[index];
            gameState.carriedArtifact = newArtifact;
            const bonus = Math.max(0, newArtifact.cohBonus - 3 * gameState.artifactsCollected);
            gameState.artifactsCollected++;
            gameState.coherence += bonus;
            gameState.grid[gameState.playerPos.y][gameState.playerPos.x] = '.';

            playSound('artifact');
            document.getElementById('modal').classList.remove('active');
            if (bonus > 0) floatText('+' + bonus, 'gold', gameState.playerPos.x, gameState.playerPos.y);

            renderGrid();
            updateStatus();
        }

        // Decline artifact
        function declineArtifact() {
            document.getElementById('modal').classList.remove('active');
            renderGrid();
            updateStatus();
        }
        
        // Show message modal
        function showMessage(title, message, isGameEnd) {
            const modal = document.getElementById('modal');
            const titleEl = document.getElementById('modal-title');
            const text = document.getElementById('modal-text');
            const buttons = document.getElementById('modal-buttons');

            titleEl.textContent = title;
            text.innerHTML = message;

            if (isGameEnd) {
                buttons.innerHTML = '<button onclick="resetGame()" id="modal-primary-btn">RESET SIGNAL</button>';
            } else {
                buttons.innerHTML = '<button onclick="closeMessage()" id="modal-primary-btn">CONTINUE</button>';
            }

            modal.classList.add('active');

            // Focus button
            setTimeout(() => {
                document.getElementById('modal-primary-btn').focus();
            }, 100);
        }

        // Close message
        function closeMessage() {
            document.getElementById('modal').classList.remove('active');
        }

        // The exit is a choice, not a wall — the whole game in one prompt
        function showExitPrompt() {
            const modal = document.getElementById('modal');
            const titleEl = document.getElementById('modal-title');
            const text = document.getElementById('modal-text');
            const buttons = document.getElementById('modal-buttons');

            titleEl.textContent = 'THE WAY OUT';
            text.innerHTML =
                'ARTIFACTS RECOVERED: ' + gameState.artifactsCollected + '/4<br>' +
                'COHERENCE REMAINING: ' + Math.max(0, gameState.coherence) + '<br><br>' +
                '<em>Transmit what you have, or go back for more?</em>';

            buttons.innerHTML =
                '<button onclick="winGame()" id="modal-primary-btn">TRANSMIT</button>' +
                '<button class="secondary" onclick="stayLonger()">GO BACK</button>';

            modal.classList.add('active');
            setTimeout(() => {
                document.getElementById('modal-primary-btn').focus();
            }, 100);
        }

        function stayLonger() {
            closeMessage();
            renderGrid();
            updateStatus();
        }

        // Ending tiers — artifacts recovered (quality of work) crossed with
        // coherence remaining (cost to self). Text from docs/coh-end-tier-messages.md
        const ENDINGS = {
            1: {
                high:   'You delivered what was needed.<br>You knew when to stop.<br>Sometimes that\'s the hardest part.',
                medium: 'You delivered what was needed.<br>It cost something, but you got out.<br>Good enough is good enough.',
                low:    'You delivered what was needed.<br>Barely.<br>You\'re going to need time to recover.'
            },
            2: {
                high:   'You pushed for quality and maintained yourself.<br>This is the balance.<br>This is how it should feel.',
                medium: 'You pushed for quality and made it work.<br>It cost you, but you\'re still whole.<br>Worth it.',
                low:    'You pushed for quality.<br>You got it.<br>But you\'re running on fumes.'
            },
            3: {
                high:   'You got everything and kept yourself intact.<br>How did you do that?<br>Whatever you\'re doing, keep doing it.',
                medium: 'You got everything you wanted.<br>It took everything you had.<br>Was it worth what it cost?',
                low:    'You got everything.<br>You gave everything.<br>Next time, maybe leave something for yourself.'
            },
            4: {
                high:   'You went back for more than was asked.<br>You stayed whole through all of it.<br>Either you\'re very good at this, or very lucky.<br>Don\'t assume it was luck.',
                medium: 'You went back for more than was asked.<br>You found them all.<br>The cost was real, but you\'re still standing.<br>Just barely.',
                low:    'You went back for more than was asked.<br>You found them all.<br>There\'s almost nothing left of you.<br>Was proving something worth this?'
            }
        };

        // Win game
        function winGame() {
            gameState.gameOver = true;
            gameState.won = true;

            playSound('exit');

            const tier = Math.max(1, Math.min(4, gameState.artifactsCollected));
            const coh = Math.max(0, gameState.coherence);
            const band = coh >= 12 ? 'high' : coh >= 6 ? 'medium' : 'low';

            const message =
                'ARTIFACTS RECOVERED: ' + gameState.artifactsCollected + '<br>' +
                'COHERENCE REMAINING: ' + coh + '<br><br>' +
                '<em>' + ENDINGS[tier][band] + '</em>';

            // The board brightens in a wave; the modal arrives a beat later
            closeMessage();
            renderGrid();
            updateStatus();
            boardEndEffect(true);
            setTimeout(() => showMessage('TRANSMISSION COMPLETE', message, true), 900);
        }

        // Lose game
        function loseGame() {
            gameState.gameOver = true;
            playSound('death');
            const n = gameState.artifactsCollected;
            const detail = n > 0
                ? 'DISSOLUTION • ' + n + (n === 1 ? ' ARTIFACT' : ' ARTIFACTS') + ' LOST TO THE NOISE'
                : 'DISSOLUTION • COHERENCE COLLAPSED';

            // The board dims and desaturates; the modal arrives a beat later
            renderGrid();
            updateStatus();
            boardEndEffect(false);
            setTimeout(() => showMessage('SIGNAL LOST', detail, true), 900);
        }

        // In-place restart — no page reload, no second audio-init click
        function resetGame() {
            gameState.coherence = 30;
            gameState.belowThreshold = false;
            gameState.turnCounter = 0;
            gameState.carriedArtifact = null;
            gameState.gameOver = false;
            gameState.won = false;
            gameState.anchorUsed = false;
            gameState.hasArtifact = false;
            gameState.artifactsCollected = 0;
            gameState.turnsBelow = 0;
            gameState.playerPos = { x: 1, y: 1 };

            // Return to the main track for the fresh run
            if (audioInitialized) {
                audioThreshold.pause();
                audioThreshold.currentTime = 0;
                audioMain.currentTime = 0;
                audioMain.play().catch(() => {});
            }

            // Clear any ending effects, then deal a fresh board
            const grid = document.getElementById('grid');
            grid.classList.remove('collapse', 'transmit', 'crossing');
            for (let y = 0; y < cellEls.length; y++) {
                for (let x = 0; x < cellEls[y].length; x++) {
                    cellEls[y][x].style.animationDelay = '';
                }
            }
            lastCoherence = 30;

            closeMessage();
            initGame();
            gridEntrance();
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            // Held keys auto-repeat at OS speed — every step here is a
            // deliberate, costly choice, so repeats are ignored
            if (e.repeat) return;

            // Check if audio init screen is active
            const audioInitActive = !document.getElementById('audio-init').classList.contains('hidden');

            if (audioInitActive) {
                // Handle Enter or Space key on audio init screen
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    initAudio();
                }
                return;
            }

            // R restarts once the run is over
            if (gameState.gameOver && (e.key === 'r' || e.key === 'R')) {
                resetGame();
                return;
            }

            if (gameState.gameOver) return;

            // Check if modal is active
            const modalActive = document.getElementById('modal').classList.contains('active');

            if (modalActive) {
                // Escape takes the "walk away" option (decline / go back / continue)
                if (e.key === 'Escape') {
                    e.preventDefault();
                    const btns = document.getElementById('modal-buttons').querySelectorAll('button');
                    if (btns.length > 0) btns[btns.length - 1].click();
                    return;
                }
                // Get all buttons in the modal
                const buttons = document.getElementById('modal-buttons').querySelectorAll('button');
                const focusedElement = document.activeElement;
                let currentIndex = Array.from(buttons).indexOf(focusedElement);

                // Handle Enter key in modals - click focused button
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    if (focusedElement && focusedElement.tagName === 'BUTTON') {
                        focusedElement.click();
                    } else if (buttons.length > 0) {
                        buttons[0].click();
                    }
                    return;
                }

                // Handle arrow keys and WASD for navigation
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A' ||
                    e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                    e.preventDefault();
                    if (currentIndex === -1) currentIndex = 0;
                    else currentIndex = (currentIndex - 1 + buttons.length) % buttons.length;
                    buttons[currentIndex].focus();
                    return;
                }

                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D' ||
                    e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                    e.preventDefault();
                    if (currentIndex === -1) currentIndex = 0;
                    else currentIndex = (currentIndex + 1) % buttons.length;
                    buttons[currentIndex].focus();
                    return;
                }

                return;
            }
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    movePlayer(1, 0);
                    break;
            }
        });
        
        // Tap/click a cell to step toward it — works on any screen size,
        // including tablets that never see the d-pad
        document.getElementById('grid').addEventListener('pointerdown', (e) => {
            if (gameState.gameOver) return;
            if (document.getElementById('modal').classList.contains('active')) return;
            if (!document.getElementById('audio-init').classList.contains('hidden')) return;

            const cell = e.target.closest ? e.target.closest('.cell') : null;
            if (!cell || cell.dataset.x === undefined) return;

            const dx = parseInt(cell.dataset.x, 10) - gameState.playerPos.x;
            const dy = parseInt(cell.dataset.y, 10) - gameState.playerPos.y;
            if (dx === 0 && dy === 0) return;

            if (Math.abs(dx) >= Math.abs(dy)) {
                movePlayer(Math.sign(dx), 0);
            } else {
                movePlayer(0, Math.sign(dy));
            }
        });

        // Keep the player layer aligned when the board resizes
        window.addEventListener('resize', () => positionPlayer(true));

        // Initialize on load
        initGame();
        gridEntrance();
    </script>
</body>
</html>
