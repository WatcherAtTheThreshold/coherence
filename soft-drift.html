<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFT DRIFT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Cormorant+Garamond:wght@400;600&display=swap');

        :root {
            --earth-deep: #1a1612;
            --earth-warm: #2d2620;
            --dawn: #e8d4c4;
            --morning: #f5e6d3;
            --midday: #fff8f0;
            --afternoon: #f0e0c8;
            --dusk: #d4a574;
            --evening: #8b6b4a;
            --night: #2a2520;
            --text-dim: #6b635a;
            --text-bright: #d4cdc0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--earth-deep);
            color: var(--text-bright);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* The scene IS the page — canvas fills the window, everything
           else floats over it (the Ember treatment) */
        #game-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        header {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.2rem, 2.6vw, 1.7rem);
            font-weight: 400;
            letter-spacing: 0.4rem;
            text-transform: uppercase;
            color: var(--dawn);
            text-shadow: 0 2px 14px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: clamp(0.6rem, 1.3vw, 0.72rem);
            color: rgba(231, 223, 207, 0.55);
            letter-spacing: 0.25rem;
            text-transform: lowercase;
            font-style: italic;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
        }

        #day-indicator {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            font-size: 0.75rem;
            color: rgba(231, 223, 207, 0.7);
            letter-spacing: 0.2rem;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.7);
        }

        .instructions {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            font-size: clamp(0.6rem, 1.3vw, 0.72rem);
            color: rgba(231, 223, 207, 0.45);
            letter-spacing: 0.1rem;
            font-style: italic;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.7);
            transition: opacity 2s ease;
        }

        #mute-btn {
            position: fixed;
            top: 12px;
            right: 14px;
            z-index: 20;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.1rem;
            color: rgba(196, 184, 165, 0.6);
            background: rgba(26, 22, 18, 0.4);
            border: 1px solid rgba(90, 85, 80, 0.4);
            border-radius: 999px;
            padding: 5px 12px;
            cursor: pointer;
            transition: color 0.25s ease, border-color 0.25s ease;
        }
        #mute-btn:hover { color: rgba(231, 223, 207, 0.95); border-color: rgba(196, 184, 165, 0.5); }

        .lifetime {
            margin-top: -0.6rem;
            margin-bottom: 1.2rem;
            font-size: 0.68rem;
            letter-spacing: 0.12rem;
            color: var(--text-dim);
            min-height: 1em;
        }

        @media (prefers-reduced-motion: reduce) {
            header, .instructions { animation: none; }
        }

        /* Audio init overlay */
        #audio-init {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--earth-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            transition: opacity 1s ease;
        }

        #audio-init.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .init-content {
            text-align: center;
            padding: 2rem;
        }

        .init-content h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 400;
            letter-spacing: 0.3rem;
            color: var(--dawn);
            margin-bottom: 1rem;
        }

        .init-content p {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .init-content button {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            padding: 0.75rem 2rem;
            background: transparent;
            border: 1px solid var(--dawn);
            color: var(--dawn);
            cursor: pointer;
            transition: all 0.5s ease;
            text-transform: lowercase;
            letter-spacing: 0.2rem;
        }

        .init-content button:hover,
        .init-content button:focus {
            background: var(--dawn);
            color: var(--earth-deep);
            outline: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    
        /* Back to the collection */
        .hub-link {
            position: fixed;
            top: 14px;
            left: 16px;
            z-index: 20;
            font-family: 'IBM Plex Mono', monospace;
            color: rgba(196, 184, 165, 0.6);
            text-decoration: none;
            font-size: 0.72rem;
            letter-spacing: 0.14rem;
            transition: color 0.25s ease;
        }
        .hub-link:hover { color: rgba(231, 223, 207, 0.95); }
    </style>
</head>
<body>
    <a class="hub-link" href="index.html">&larr; the hub</a>
    <!-- Audio init overlay -->
    <div id="audio-init">
        <div class="init-content">
            <h2>Soft Drift</h2>
            <p>a small stall, quiet days</p>
            <div class="lifetime" id="title-lifetime"></div>
            <button id="init-audio-btn" onclick="initGame()" autofocus>open shop</button>
        </div>
    </div>

    <canvas id="game-canvas" width="600" height="500"></canvas>
    <button id="mute-btn" aria-label="toggle sound">sound on</button>

    <header>
        <h1>Soft Drift</h1>
        <div class="subtitle">tend the stall</div>
    </header>

    <div id="day-indicator">day 1</div>
    <div class="instructions">drag cubes to fulfill orders</div>

    <!-- Audio -->
    <audio id="music" loop>
        <source src="music/soft-drift.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ============================================
        // SOFT DRIFT - A quiet shopkeeping game
        // ============================================

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const music = document.getElementById('music');

        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // ============================================
        // PERSISTENCE — the stall remembers its keeper
        // ============================================

        const SAVE_KEY = 'soft-drift-save';

        function loadSave() {
            try {
                const raw = localStorage.getItem(SAVE_KEY);
                if (raw) return Object.assign(defaultSave(), JSON.parse(raw));
            } catch (e) { /* private mode — play without memory */ }
            return defaultSave();
        }
        function defaultSave() { return { bestStreak: 0, daysTended: 0, totalServed: 0, muted: false }; }
        function persist() {
            try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch (e) {}
        }
        const save = loadSave();
        let muted = save.muted;

        function setMuted(m) {
            muted = m;
            save.muted = m;
            persist();
            music.muted = m;
            document.getElementById('mute-btn').textContent = m ? 'sound off' : 'sound on';
        }

        // ============================================
        // VIEW — the world is authored in 600x500; the window shows a
        // whole landscape around it (screen-space sky, ground, hills)
        // ============================================

        const WORLD_W = 600, WORLD_H = 500;
        let W = 0, H = 0, viewScale = 1, viewX = 0, viewY = 0;
        let stars = [], clouds = [];

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
            viewScale = Math.min(W / (WORLD_W + 40), (H * 0.92) / WORLD_H);
            viewX = (W - WORLD_W * viewScale) / 2;
            viewY = H - WORLD_H * viewScale; // ground meets the bottom edge
            makeSkyDressing();
        }

        function makeSkyDressing() {
            stars = [];
            for (let i = 0; i < 70; i++) {
                stars.push({ x: Math.random(), y: Math.random() * 0.85, r: 0.4 + Math.random() * 1.1, tw: Math.random() * Math.PI * 2 });
            }
            clouds = [];
            for (let i = 0; i < 4; i++) {
                clouds.push({ x: Math.random(), y: 0.12 + Math.random() * 0.3, s: 0.7 + Math.random() * 0.8, drift: 0.004 + Math.random() * 0.006 });
            }
        }

        // Visible world-space bounds (screen edges converted to world x)
        function worldLeft() { return -viewX / viewScale - 60; }
        function worldRight() { return (W - viewX) / viewScale + 60; }

        window.addEventListener('resize', resize);
        resize();

        // ============================================
        // AUDIO SYSTEM - Gentle procedural sounds
        // ============================================

        let audioContext = null;

        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        // Play a gentle chime sound
        // satisfaction: 3 = immediate (highest), 2 = waited a bit, 1 = waited long
        function playChime(satisfaction = 3) {
            if (!audioContext || muted) return;

            const now = audioContext.currentTime;

            // Create oscillator for main tone
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            // Different tones based on satisfaction
            // Higher satisfaction = more harmonious, brighter sound
            if (satisfaction === 3) {
                // Immediate service - bright, happy chime (major chord arpeggio)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523, now);      // C5
                osc.frequency.setValueAtTime(659, now + 0.1); // E5
                osc.frequency.setValueAtTime(784, now + 0.2); // G5
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.001, now + 0.5);
            } else if (satisfaction === 2) {
                // Waited a bit - pleasant but simpler
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);      // A4
                osc.frequency.setValueAtTime(523, now + 0.12); // C5
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.linearRampToValueAtTime(0.001, now + 0.4);
            } else {
                // Waited long - single soft tone
                osc.type = 'sine';
                osc.frequency.setValueAtTime(392, now);      // G4
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
            }

            osc.start(now);
            osc.stop(now + 0.6);

            // Add a second harmonic for richness on high satisfaction
            if (satisfaction >= 2) {
                const osc2 = audioContext.createOscillator();
                const gain2 = audioContext.createGain();
                osc2.connect(gain2);
                gain2.connect(audioContext.destination);
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(satisfaction === 3 ? 1047 : 880, now); // Octave up
                gain2.gain.setValueAtTime(0.05, now);
                gain2.gain.linearRampToValueAtTime(0.001, now + 0.3);
                osc2.start(now);
                osc2.stop(now + 0.4);
            }
        }

        // Play a soft pickup sound when grabbing a cube
        function playPickup() {
            if (!audioContext || muted) return;

            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(330, now);
            osc.frequency.linearRampToValueAtTime(440, now + 0.05);
            gain.gain.setValueAtTime(0.06, now);
            gain.gain.linearRampToValueAtTime(0.001, now + 0.1);

            osc.start(now);
            osc.stop(now + 0.15);
        }

        // Play a soft thud when placing cube back
        function playPlace() {
            if (!audioContext || muted) return;

            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(220, now);
            osc.frequency.linearRampToValueAtTime(110, now + 0.08);
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.linearRampToValueAtTime(0.001, now + 0.15);

            osc.start(now);
            osc.stop(now + 0.2);
        }

        // Game state
        const game = {
            running: false,
            day: 1,
            timeOfDay: 0, // 0-1, where 0 = dawn, 0.5 = midday, 1 = dusk
            dayDuration: 90000, // 90 seconds per day
            dayElapsed: 0, // accumulated play-time ms — pauses with the tab
            servedToday: 0,
            transitioning: false,
            transitionAlpha: 0,

            player: null,
            customers: [],
            cubes: [],
            animals: [],

            dragging: null,
            dragOffset: { x: 0, y: 0 },

            // Stall dimensions
            stall: {
                counterY: 320,
                counterHeight: 20,
                shelfY: 380,
            },

            // Streak tracking (best lives in the persisted save)
            streak: 0
        };

        // Color palette for cubes
        const cubeColors = [
            '#e07850', // warm red-orange
            '#50a078', // sage green
            '#5080b0', // soft blue
            '#d0a050', // golden yellow
            '#a070a0', // muted purple
            '#70b0b0', // teal
        ];

        // Sky colors for time of day
        const skyColors = {
            dawn: { top: '#4a3a50', bottom: '#d4a080' },
            morning: { top: '#6090c0', bottom: '#d0e0f0' },
            midday: { top: '#70a0d0', bottom: '#e8f0f8' },
            afternoon: { top: '#80a0c0', bottom: '#f0e8d8' },
            dusk: { top: '#605060', bottom: '#e0a070' },
            evening: { top: '#302838', bottom: '#805040' },
            night: { top: '#1a1820', bottom: '#2a2830' }
        };

        // Character sprites (8-bit style, defined as pixel patterns)
        const characterSprites = {
            // Different skin tones and features
            bodies: [
                { skin: '#e8c4a0', hair: '#4a3020', shirt: '#607090' },
                { skin: '#c49070', hair: '#2a2020', shirt: '#906050' },
                { skin: '#8b6040', hair: '#1a1010', shirt: '#509060' },
                { skin: '#d4a878', hair: '#705030', shirt: '#805080' },
                { skin: '#f0d0b0', hair: '#c08040', shirt: '#508090' },
                { skin: '#a07050', hair: '#201510', shirt: '#909050' },
            ],
            // Wizard variants (crossover easter egg from Wizard Masters)
            wizards: [
                { skin: '#e8c4a0', robe: '#4a3a60', element: '#e07050' }, // Fire
                { skin: '#c49070', robe: '#3a4a60', element: '#5080b0' }, // Water
                { skin: '#8b6040', robe: '#3a6050', element: '#70a060' }, // Earth
                { skin: '#d4a878', robe: '#504060', element: '#a070c0' }, // Cosmic
            ]
        };

        // Animal types
        const animalTypes = [
            { name: 'bird', color: '#908070', size: 8 },
            { name: 'cat', color: '#a09080', size: 12 },
            { name: 'butterfly', color: '#c090a0', size: 6 },
        ];

        // ============================================
        // INITIALIZATION
        // ============================================

        function initGame() {
            initAudio(); // Initialize Web Audio for sound effects
            music.volume = 0.4;
            setMuted(muted); // apply persisted preference
            music.play().catch(err => console.log('Audio error:', err));

            document.getElementById('audio-init').classList.add('hidden');

            // Create player (random appearance)
            game.player = createCharacter(true);

            // Create initial cubes on the shelf
            createShelfCubes();

            // Spawn first customer after a moment
            setTimeout(spawnCustomer, 2000);

            // Spawn ambient animals
            spawnAnimals();

            // Start game
            game.running = true;
            game.dayElapsed = 0;
            lastFrameTime = performance.now();
            updateDayIndicator();
            requestAnimationFrame(gameLoop);

            // Set up input
            setupInput();
        }

        function createCharacter(isPlayer = false, fromLeft = false) {
            // 5% chance for a wizard customer (easter egg from Wizard Masters)
            const isWizard = !isPlayer && Math.random() < 0.05;

            let appearance;
            if (isWizard) {
                const wizardAppearance = characterSprites.wizards[Math.floor(Math.random() * characterSprites.wizards.length)];
                appearance = {
                    skin: wizardAppearance.skin,
                    hair: wizardAppearance.robe, // Use robe color for "hair" slot
                    shirt: wizardAppearance.robe,
                    isWizard: true,
                    element: wizardAppearance.element,
                    robe: wizardAppearance.robe
                };
            } else {
                appearance = characterSprites.bodies[Math.floor(Math.random() * characterSprites.bodies.length)];
                appearance.isWizard = false;
            }

            return {
                x: isPlayer ? WORLD_W / 2 : (fromLeft ? worldLeft() : worldRight()),
                y: isPlayer ? game.stall.counterY - 10 : game.stall.counterY + 70,
                width: 24,
                height: 32,
                ...appearance,
                isPlayer: isPlayer,
                targetX: null,
                order: null,
                orderFulfilled: false,
                waitTime: 0,
                leaving: false,
                satisfied: false,
                satisfactionLevel: 3, // 3 = immediate, 2 = waited a bit, 1 = waited long
                fromLeft: fromLeft,   // Track which side they came from
                facingLeft: !fromLeft // Face toward center when arriving
            };
        }

        function createShelfCubes() {
            game.cubes = [];

            // Define fixed shelf positions
            game.shelfPositions = [
                { x: 150, y: game.stall.shelfY + 10 },
                { x: 200, y: game.stall.shelfY + 10 },
                { x: 250, y: game.stall.shelfY + 10 },
                { x: 300, y: game.stall.shelfY + 10 },
                { x: 175, y: game.stall.shelfY + 45 },
                { x: 225, y: game.stall.shelfY + 45 },
                { x: 275, y: game.stall.shelfY + 45 },
                { x: 325, y: game.stall.shelfY + 45 },
            ];

            for (let i = 0; i < 8; i++) {
                const pos = game.shelfPositions[i];
                game.cubes.push({
                    x: pos.x + Math.random() * 6 - 3,
                    y: pos.y,
                    size: 28,
                    color: cubeColors[Math.floor(Math.random() * cubeColors.length)],
                    originalX: pos.x,
                    originalY: pos.y,
                    onShelf: true,
                    slotIndex: i
                });
            }
        }

        function spawnCustomer() {
            if (!game.running || game.transitioning) return;
            if (game.customers.length >= 3) {
                setTimeout(spawnCustomer, 3000);
                return;
            }

            // Get colors currently available on shelf
            const availableColors = getAvailableColors();
            if (availableColors.length === 0) {
                // No cubes available, try again later
                setTimeout(spawnCustomer, 2000);
                return;
            }

            // Randomly choose which side customer enters from
            const fromLeft = Math.random() < 0.5;
            const customer = createCharacter(false, fromLeft);

            // Create order (1-2 cubes) using only available colors
            const orderSize = Math.floor(Math.random() * 2) + 1;
            customer.order = [];
            for (let i = 0; i < orderSize; i++) {
                // Pick from available colors
                const color = availableColors[Math.floor(Math.random() * availableColors.length)];
                customer.order.push(color);
            }

            // Position in line
            const positions = [200, 300, 400];
            const takenPositions = game.customers.map(c => c.targetX);
            const availablePositions = positions.filter(p => !takenPositions.includes(p));

            if (availablePositions.length > 0) {
                customer.targetX = availablePositions[0];
                game.customers.push(customer);
            }

            // Spawn next customer
            const nextSpawn = 5000 + Math.random() * 8000;
            setTimeout(spawnCustomer, nextSpawn);
        }

        function spawnAnimals() {
            // Spawn a few ambient animals
            for (let i = 0; i < 3; i++) {
                const type = animalTypes[Math.floor(Math.random() * animalTypes.length)];
                game.animals.push({
                    type: type.name,
                    x: worldLeft() + 60 + Math.random() * (worldRight() - worldLeft() - 120),
                    y: 50 + Math.random() * 100,
                    size: type.size,
                    color: type.color,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.2,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        // ============================================
        // INPUT HANDLING
        // ============================================

        function setupInput() {
            canvas.addEventListener('mousedown', startDrag);
            canvas.addEventListener('mousemove', doDrag);
            canvas.addEventListener('mouseup', endDrag);
            canvas.addEventListener('mouseleave', endDrag);

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                startDrag({ clientX: touch.clientX, clientY: touch.clientY });
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                doDrag({ clientX: touch.clientX, clientY: touch.clientY });
            });

            canvas.addEventListener('touchend', endDrag);
        }

        // Screen pixels → world coordinates (through the view transform)
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left - viewX) / viewScale,
                y: (e.clientY - rect.top - viewY) / viewScale
            };
        }

        function startDrag(e) {
            const pos = getCanvasPos(e);

            // Check if clicking on a cube
            for (let i = game.cubes.length - 1; i >= 0; i--) {
                const cube = game.cubes[i];
                if (pos.x >= cube.x && pos.x <= cube.x + cube.size &&
                    pos.y >= cube.y && pos.y <= cube.y + cube.size) {
                    game.dragging = cube;
                    game.dragOffset = {
                        x: pos.x - cube.x,
                        y: pos.y - cube.y
                    };
                    cube.onShelf = false;
                    playPickup();
                    break;
                }
            }
        }

        function doDrag(e) {
            if (!game.dragging) return;
            const pos = getCanvasPos(e);
            game.dragging.x = pos.x - game.dragOffset.x;
            game.dragging.y = pos.y - game.dragOffset.y;
        }

        function endDrag() {
            if (!game.dragging) return;

            const cube = game.dragging;
            let delivered = false;

            // Check if dropped on a customer
            for (const customer of game.customers) {
                if (!customer.leaving && customer.order && customer.order.length > 0) {
                    // Generous hitbox that covers character + speech bubble
                    const customerBounds = {
                        x: customer.x - 40,
                        y: customer.y - 90,  // Extends up to cover speech bubble
                        width: 80,
                        height: 130
                    };

                    if (cube.x + cube.size/2 > customerBounds.x &&
                        cube.x + cube.size/2 < customerBounds.x + customerBounds.width &&
                        cube.y + cube.size/2 > customerBounds.y &&
                        cube.y + cube.size/2 < customerBounds.y + customerBounds.height) {

                        // Check if color matches order
                        const orderIndex = customer.order.indexOf(cube.color);
                        if (orderIndex !== -1) {
                            // Correct item!
                            customer.order.splice(orderIndex, 1);
                            delivered = true;

                            // Remove cube
                            const cubeIndex = game.cubes.indexOf(cube);
                            if (cubeIndex !== -1) {
                                game.cubes.splice(cubeIndex, 1);
                            }

                            // Check if order complete
                            if (customer.order.length === 0) {
                                customer.satisfied = true;
                                customer.leaving = true;
                                // Play chime based on how long they waited
                                playChime(customer.satisfactionLevel);

                                // Update streak + lifetime tallies (persisted)
                                game.streak++;
                                game.servedToday++;
                                save.totalServed++;
                                if (game.streak > save.bestStreak) {
                                    save.bestStreak = game.streak;
                                }
                                persist();
                                updateDayIndicator();
                            }

                            // Replenish shelf
                            setTimeout(replenishCube, 1000);
                        }
                        break;
                    }
                }
            }

            // If not delivered, return to shelf
            if (!delivered) {
                cube.x = cube.originalX;
                cube.y = cube.originalY;
                cube.onShelf = true;
                playPlace();
            }

            game.dragging = null;
        }

        function replenishCube() {
            if (game.cubes.length >= 8) return;

            // Find which slot indices are currently occupied
            const occupiedSlots = new Set(game.cubes.map(c => c.slotIndex));

            // Find first empty slot
            let emptySlotIndex = -1;
            for (let i = 0; i < 8; i++) {
                if (!occupiedSlots.has(i)) {
                    emptySlotIndex = i;
                    break;
                }
            }

            if (emptySlotIndex === -1) return;

            const pos = game.shelfPositions[emptySlotIndex];
            const cube = {
                x: pos.x + Math.random() * 6 - 3,
                y: pos.y,
                size: 28,
                color: cubeColors[Math.floor(Math.random() * cubeColors.length)],
                originalX: pos.x,
                originalY: pos.y,
                onShelf: true,
                slotIndex: emptySlotIndex
            };
            game.cubes.push(cube);
        }

        function getAvailableColors() {
            // Get colors currently on shelf
            const available = new Set();
            for (const cube of game.cubes) {
                if (cube.onShelf) {
                    available.add(cube.color);
                }
            }
            return Array.from(available);
        }

        // ============================================
        // UI UPDATES
        // ============================================

        function updateDayIndicator() {
            let text = `day ${game.day}`;
            if (game.streak > 0) {
                text += ` · streak: ${game.streak}`;
            }
            if (save.bestStreak > 2) {
                text += ` (best: ${save.bestStreak})`;
            }
            document.getElementById('day-indicator').textContent = text;
        }

        // ============================================
        // GAME LOOP
        // ============================================

        let lastFrameTime = 0;

        function gameLoop(timestamp) {
            if (!game.running) return;

            // Delta time, clamped: consistent speed at any refresh rate,
            // and the day PAUSES while the tab is hidden (rAF stops, and
            // the clamp swallows the gap) instead of skipping to nightfall
            const dt = Math.min(50, timestamp - lastFrameTime);
            lastFrameTime = timestamp;

            update(dt);
            render();

            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            const frames = dt / 16.67; // motion constants are tuned per-60fps-frame

            // Update time of day (accumulated play time, not wall clock)
            game.dayElapsed += dt;
            game.timeOfDay = Math.min(1, game.dayElapsed / game.dayDuration);

            // Check for day end
            if (game.timeOfDay >= 1 && !game.transitioning) {
                startNightTransition();
            }

            // Update customers
            for (let i = game.customers.length - 1; i >= 0; i--) {
                const customer = game.customers[i];

                if (customer.leaving) {
                    // Walk away in the direction they came from — all the
                    // way to the actual screen edge
                    if (customer.fromLeft) {
                        customer.x -= 1.5 * frames;
                        customer.facingLeft = true;
                        if (customer.x < worldLeft()) {
                            game.customers.splice(i, 1);
                        }
                    } else {
                        customer.x += 1.5 * frames;
                        customer.facingLeft = false;
                        if (customer.x > worldRight()) {
                            game.customers.splice(i, 1);
                        }
                    }
                } else if (customer.targetX !== null) {
                    // Walk to position
                    if (customer.x > customer.targetX + 2) {
                        customer.x -= 1 * frames;
                        customer.facingLeft = true;
                    } else if (customer.x < customer.targetX - 2) {
                        customer.x += 1 * frames;
                        customer.facingLeft = false;
                    }

                    // Wait timer - update satisfaction level based on wait time
                    customer.waitTime += dt;

                    // Patience thresholds (in ms)
                    // 0-5 seconds: 3 hearts (immediate service)
                    // 5-12 seconds: 2 hearts (waited a bit)
                    // 12-20 seconds: 1 heart (waited long)
                    // 20+ seconds: give up and leave
                    if (customer.waitTime < 5000) {
                        customer.satisfactionLevel = 3;
                    } else if (customer.waitTime < 12000) {
                        customer.satisfactionLevel = 2;
                    } else if (customer.waitTime < 20000) {
                        customer.satisfactionLevel = 1;
                    } else {
                        // Give up and leave (no satisfaction)
                        customer.leaving = true;
                        customer.satisfied = false;
                        // Reset streak
                        game.streak = 0;
                        updateDayIndicator();
                    }
                }
            }

            // Update animals — they roam the full visible landscape
            for (const animal of game.animals) {
                animal.phase += 0.05 * frames;

                if (animal.type === 'bird') {
                    animal.x += animal.vx * frames;
                    animal.y += Math.sin(animal.phase) * 0.3 * frames;
                    if (animal.x < worldLeft()) animal.x = worldRight();
                    if (animal.x > worldRight()) animal.x = worldLeft();
                } else if (animal.type === 'butterfly') {
                    animal.x += Math.sin(animal.phase * 1.5) * 0.5 * frames;
                    animal.y += Math.cos(animal.phase) * 0.3 * frames;
                    animal.x += animal.vx * frames;
                    if (animal.x < worldLeft() + 40 || animal.x > worldRight() - 40) animal.vx *= -1;
                    if (animal.y < 30 || animal.y > 150) animal.vy *= -1;
                } else if (animal.type === 'cat') {
                    // Cat just sits and occasionally moves
                    if (Math.random() < 0.002 * frames) {
                        animal.vx = (Math.random() - 0.5) * 0.5;
                    }
                    animal.x += animal.vx * frames;
                    animal.vx *= Math.pow(0.98, frames);
                    animal.x = Math.max(20, Math.min(WORLD_W - 20, animal.x));
                    animal.y = game.stall.counterY + 80; // On the ground
                }
            }

            // Update transition
            if (game.transitioning) {
                game.transitionAlpha += 0.01 * frames;
                if (game.transitionAlpha >= 1) {
                    // New day — remember it
                    game.day++;
                    save.daysTended++;
                    persist();
                    game.streak = 0; // Reset streak at end of day
                    game.servedToday = 0;
                    updateDayIndicator();
                    game.timeOfDay = 0;
                    game.dayElapsed = 0;
                    game.customers = [];
                    createShelfCubes();

                    // Fade back in
                    setTimeout(() => {
                        const fadeIn = setInterval(() => {
                            game.transitionAlpha -= 0.02;
                            if (game.transitionAlpha <= 0) {
                                game.transitionAlpha = 0;
                                game.transitioning = false;
                                clearInterval(fadeIn);
                                setTimeout(spawnCustomer, 2000);
                            }
                        }, 30);
                    }, 1500);
                }
            }
        }

        function startNightTransition() {
            game.transitioning = true;
            game.transitionAlpha = 0;

            // Clear remaining customers
            for (const customer of game.customers) {
                customer.leaving = true;
            }
        }

        // ============================================
        // RENDERING
        // ============================================

        function render() {
            // === SCREEN SPACE: the landscape fills the whole window ===
            drawSky();
            drawCelestial();
            drawBackground();

            // === WORLD SPACE: the stall scene, bottom-anchored ===
            ctx.save();
            ctx.translate(viewX, viewY);
            ctx.scale(viewScale, viewScale);

            // Dirt path in front of the stall
            ctx.fillStyle = '#6a6050';
            ctx.fillRect(100, 350, 400, 150);

            drawAnimals();
            drawStallBack();
            drawCharacter(game.player);

            for (const cube of game.cubes) {
                if (cube !== game.dragging && cube.onShelf) {
                    drawCube(cube);
                }
            }

            drawStallCounter();

            for (const customer of game.customers) {
                drawCharacter(customer);
                if (customer.satisfied && customer.leaving) {
                    drawHeartBubble(customer);
                } else if (customer.order && customer.order.length > 0 && !customer.leaving) {
                    drawOrderBubble(customer);
                }
            }

            drawFireflies();

            if (game.dragging) {
                drawCube(game.dragging);
            }

            ctx.restore();

            // Transition overlay + day-end summary
            if (game.transitioning || game.transitionAlpha > 0) {
                const a = Math.min(1, game.transitionAlpha);
                ctx.fillStyle = `rgba(26, 22, 18, ${a})`;
                ctx.fillRect(0, 0, W, H);

                if (a > 0.55) {
                    const textA = (a - 0.55) / 0.45;
                    ctx.textAlign = 'center';
                    ctx.fillStyle = `rgba(232, 212, 196, ${textA * 0.9})`;
                    ctx.font = `${Math.round(Math.max(20, H * 0.035))}px 'Cormorant Garamond', serif`;
                    ctx.fillText(`day ${game.day} closes`, W / 2, H * 0.44);
                    ctx.fillStyle = `rgba(196, 184, 165, ${textA * 0.7})`;
                    ctx.font = `${Math.round(Math.max(11, H * 0.016))}px 'IBM Plex Mono', monospace`;
                    const served = game.servedToday === 1 ? '1 soul served' : game.servedToday + ' souls served';
                    ctx.fillText(served + ' · ' + save.totalServed + ' in all your days', W / 2, H * 0.5);
                }
            }
        }

        function skyPalette(t) {
            if (t < 0.15) return lerpColors(skyColors.dawn, skyColors.morning, t / 0.15);
            if (t < 0.4) return lerpColors(skyColors.morning, skyColors.midday, (t - 0.15) / 0.25);
            if (t < 0.6) return lerpColors(skyColors.midday, skyColors.afternoon, (t - 0.4) / 0.2);
            if (t < 0.8) return lerpColors(skyColors.afternoon, skyColors.dusk, (t - 0.6) / 0.2);
            if (t < 0.9) return lerpColors(skyColors.dusk, skyColors.evening, (t - 0.8) / 0.1);
            return lerpColors(skyColors.evening, skyColors.night, (t - 0.9) / 0.1);
        }

        function horizonY() { return viewY + 200 * viewScale; }

        function drawSky() {
            const colors = skyPalette(game.timeOfDay);
            const gradient = ctx.createLinearGradient(0, 0, 0, horizonY());
            gradient.addColorStop(0, colors.top);
            gradient.addColorStop(1, colors.bottom);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
        }

        function drawCelestial() {
            const t = game.timeOfDay;
            const hy = horizonY();
            const now = reducedMotion ? 0 : performance.now();

            // Sun arcs dawn → dusk; moon rises for the evening
            if (t < 0.82) {
                const p = t / 0.82;
                const sx = W * (0.08 + p * 0.84);
                const sy = hy - Math.sin(p * Math.PI) * hy * 0.75 - 20;
                const warm = t < 0.15 || t > 0.65;
                const glow = ctx.createRadialGradient(sx, sy, 4, sx, sy, 60);
                glow.addColorStop(0, warm ? 'rgba(240, 180, 110, 0.5)' : 'rgba(255, 245, 220, 0.45)');
                glow.addColorStop(1, 'rgba(255, 240, 200, 0)');
                ctx.fillStyle = glow;
                ctx.fillRect(sx - 60, sy - 60, 120, 120);
                ctx.fillStyle = warm ? '#f0c088' : '#fff4dc';
                ctx.beginPath();
                ctx.arc(sx, sy, 14, 0, Math.PI * 2);
                ctx.fill();
            } else {
                const p = (t - 0.82) / 0.18;
                const mx = W * (0.15 + p * 0.25);
                const my = hy * (0.5 - p * 0.25);
                ctx.fillStyle = 'rgba(230, 232, 240, 0.9)';
                ctx.beginPath();
                ctx.arc(mx, my, 11, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = skyPalette(t).top;
                ctx.beginPath();
                ctx.arc(mx - 5, my - 3, 9, 0, Math.PI * 2);
                ctx.fill();
            }

            // Stars fade in as evening settles
            const starA = Math.max(0, (t - 0.8) / 0.2);
            if (starA > 0.01) {
                for (const s of stars) {
                    const tw = reducedMotion ? 0.8 : 0.55 + 0.45 * Math.sin(now / 800 + s.tw);
                    ctx.fillStyle = `rgba(225, 228, 238, ${(starA * tw * 0.8).toFixed(3)})`;
                    ctx.beginPath();
                    ctx.arc(s.x * W, s.y * hy, s.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Soft clouds drift through the daylight hours
            const cloudA = Math.max(0, 0.5 - Math.abs(t - 0.45)) * 0.9 + 0.1;
            if (t < 0.85) {
                for (const c of clouds) {
                    const cx = ((c.x + (reducedMotion ? 0 : now / 1000000 * c.drift * 60)) % 1.2 - 0.1) * W;
                    const cy = c.y * hy;
                    const cs = c.s * viewScale;
                    ctx.fillStyle = `rgba(255, 253, 248, ${(0.16 * cloudA).toFixed(3)})`;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, 55 * cs, 16 * cs, 0, 0, Math.PI * 2);
                    ctx.ellipse(cx + 30 * cs, cy - 8 * cs, 38 * cs, 13 * cs, 0, 0, Math.PI * 2);
                    ctx.ellipse(cx - 34 * cs, cy - 5 * cs, 30 * cs, 11 * cs, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function lerpColors(c1, c2, t) {
            return {
                top: lerpColor(c1.top, c2.top, t),
                bottom: lerpColor(c1.bottom, c2.bottom, t)
            };
        }

        function lerpColor(color1, color2, t) {
            const r1 = parseInt(color1.slice(1, 3), 16);
            const g1 = parseInt(color1.slice(3, 5), 16);
            const b1 = parseInt(color1.slice(5, 7), 16);
            const r2 = parseInt(color2.slice(1, 3), 16);
            const g2 = parseInt(color2.slice(3, 5), 16);
            const b2 = parseInt(color2.slice(5, 7), 16);
            const r = Math.round(r1 + (r2 - r1) * t);
            const g = Math.round(g1 + (g2 - g1) * t);
            const b = Math.round(b1 + (b2 - b1) * t);
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        function drawBackground() {
            // Screen space: hills roll across the entire window width,
            // ground runs to the bottom edge — no box, just landscape
            const hy = horizonY();
            const hillH = 60 * viewScale;

            // Far hills (dimmer, higher)
            ctx.fillStyle = '#4e5c50';
            ctx.beginPath();
            ctx.moveTo(0, hy);
            const seg1 = Math.max(3, Math.ceil(W / 300));
            for (let i = 0; i <= seg1; i++) {
                const x = (i / seg1) * W;
                const peak = hy - hillH * (0.7 + 0.5 * Math.sin(i * 2.1 + 1));
                ctx.quadraticCurveTo(x - W / seg1 / 2, peak, x, hy - hillH * 0.35 * (1 + Math.sin(i * 1.3)));
            }
            ctx.lineTo(W, hy);
            ctx.closePath();
            ctx.fill();

            // Near hills
            ctx.fillStyle = '#5a6858';
            ctx.beginPath();
            ctx.moveTo(0, hy + 2);
            const seg2 = Math.max(3, Math.ceil(W / 220));
            for (let i = 0; i <= seg2; i++) {
                const x = (i / seg2) * W;
                const peak = hy - hillH * (0.35 + 0.35 * Math.sin(i * 1.7 + 4));
                ctx.quadraticCurveTo(x - W / seg2 / 2, peak, x, hy - hillH * 0.1 * (1 + Math.sin(i * 2.3)));
            }
            ctx.lineTo(W, hy + 2);
            ctx.closePath();
            ctx.fill();

            // Ground plane, full width to the bottom of the window
            ctx.fillStyle = '#4a5848';
            ctx.fillRect(0, hy, W, H - hy);
        }

        // Fireflies rise near the stall as evening settles (world space)
        let fireflies = null;
        function drawFireflies() {
            const t = game.timeOfDay;
            const a = Math.max(0, (t - 0.72) / 0.28);
            if (a < 0.02 || reducedMotion) return;
            if (!fireflies) {
                fireflies = [];
                for (let i = 0; i < 9; i++) {
                    fireflies.push({ x: 60 + Math.random() * 480, y: 300 + Math.random() * 160, ph: Math.random() * Math.PI * 2, sp: 0.5 + Math.random() });
                }
            }
            const now = performance.now();
            for (const f of fireflies) {
                const fx = f.x + Math.sin(now / 1700 * f.sp + f.ph) * 22;
                const fy = f.y + Math.cos(now / 2300 * f.sp + f.ph) * 14;
                const pulse = 0.4 + 0.6 * Math.abs(Math.sin(now / 900 * f.sp + f.ph));
                ctx.fillStyle = `rgba(220, 230, 140, ${(a * pulse * 0.8).toFixed(3)})`;
                ctx.beginPath();
                ctx.arc(fx, fy, 1.6, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawStallBack() {
            // Back wall
            ctx.fillStyle = '#5a4a3a';
            ctx.fillRect(120, 240, 360, 100);

            // Wood grain details
            ctx.strokeStyle = '#4a3a2a';
            ctx.lineWidth = 1;
            for (let y = 250; y < 340; y += 15) {
                ctx.beginPath();
                ctx.moveTo(120, y);
                ctx.lineTo(480, y);
                ctx.stroke();
            }

            // Shelf (behind cubes)
            ctx.fillStyle = '#5a4a3a';
            ctx.fillRect(140, game.stall.shelfY - 5, 320, 8);

            // Awning
            const awningColors = ['#c07050', '#d08060'];
            for (let i = 0; i < 8; i++) {
                ctx.fillStyle = awningColors[i % 2];
                ctx.beginPath();
                ctx.moveTo(100 + i * 50, 220);
                ctx.lineTo(150 + i * 50, 220);
                ctx.lineTo(140 + i * 50, 240);
                ctx.lineTo(110 + i * 50, 240);
                ctx.fill();
            }
        }

        function drawStallCounter() {
            // Counter top
            ctx.fillStyle = '#7a6a5a';
            ctx.fillRect(100, game.stall.counterY, 400, game.stall.counterHeight);

            // Counter front
            ctx.fillStyle = '#6a5a4a';
            ctx.fillRect(100, game.stall.counterY + game.stall.counterHeight, 400, 30);
        }

        function drawHeartBubble(customer) {
            const bubbleX = customer.x;
            const bubbleY = customer.y - 55;
            const satisfaction = customer.satisfactionLevel;

            // Adjust bubble size based on number of hearts
            const bubbleRadius = satisfaction === 3 ? 22 : (satisfaction === 2 ? 18 : 15);

            // Bubble background
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.arc(bubbleX, bubbleY, bubbleRadius, 0, Math.PI * 2);
            ctx.fill();

            // Bubble tail
            ctx.beginPath();
            ctx.moveTo(bubbleX - 5, bubbleY + bubbleRadius - 3);
            ctx.lineTo(bubbleX + 5, bubbleY + bubbleRadius - 3);
            ctx.lineTo(bubbleX, bubbleY + bubbleRadius + 7);
            ctx.fill();

            // Draw hearts based on satisfaction level
            // 3 hearts: big + medium + small (stacked/arranged nicely)
            // 2 hearts: big + small
            // 1 heart: just one big heart
            ctx.fillStyle = '#e06080';

            if (satisfaction === 3) {
                // Main heart (center)
                drawHeart(bubbleX, bubbleY + 2, 1.0);
                // Smaller heart (top left)
                drawHeart(bubbleX - 10, bubbleY - 6, 0.5);
                // Even smaller heart (top right)
                drawHeart(bubbleX + 10, bubbleY - 5, 0.35);
            } else if (satisfaction === 2) {
                // Main heart (center-left)
                drawHeart(bubbleX - 4, bubbleY + 1, 0.9);
                // Smaller heart (right)
                drawHeart(bubbleX + 8, bubbleY - 2, 0.5);
            } else {
                // Single heart
                drawHeart(bubbleX, bubbleY + 2, 1.0);
            }
        }

        function drawHeart(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.beginPath();
            // Heart shape centered at origin
            ctx.moveTo(0, 4);
            ctx.bezierCurveTo(-8, -6, -12, 2, 0, 10);
            ctx.bezierCurveTo(12, 2, 8, -6, 0, 4);
            ctx.fill();
            ctx.restore();
        }

        function drawCharacter(char) {
            const x = Math.floor(char.x);
            const y = Math.floor(char.y);
            const w = char.width;
            const h = char.height;

            // Flip character if facing left (for customers)
            ctx.save();
            if (char.facingLeft && !char.isPlayer) {
                ctx.translate(x, 0);
                ctx.scale(-1, 1);
                ctx.translate(-x, 0);
            }

            if (char.isWizard) {
                // Draw wizard character (crossover from Wizard Masters)
                // Robe (body)
                ctx.fillStyle = char.robe;
                ctx.beginPath();
                ctx.moveTo(x - 10, y);
                ctx.lineTo(x - 6, y - h + 16);
                ctx.lineTo(x + 6, y - h + 16);
                ctx.lineTo(x + 10, y);
                ctx.closePath();
                ctx.fill();

                // Robe trim
                ctx.fillStyle = char.element;
                ctx.fillRect(x - 10, y - 4, 20, 3);

                // Head
                ctx.fillStyle = char.skin;
                ctx.beginPath();
                ctx.arc(x, y - h + 10, 6, 0, Math.PI * 2);
                ctx.fill();

                // Pointy wizard hat
                ctx.fillStyle = char.robe;
                ctx.beginPath();
                ctx.moveTo(x - 7, y - h + 6);
                ctx.lineTo(x, y - h - 10);
                ctx.lineTo(x + 7, y - h + 6);
                ctx.closePath();
                ctx.fill();

                // Hat band
                ctx.fillStyle = char.element;
                ctx.fillRect(x - 7, y - h + 4, 14, 3);

                // Eyes
                ctx.fillStyle = '#202020';
                ctx.fillRect(x - 4, y - h + 9, 2, 2);
                ctx.fillRect(x + 2, y - h + 9, 2, 2);

                // Element gem
                ctx.fillStyle = char.element;
                ctx.beginPath();
                ctx.moveTo(x, y - h + 20);
                ctx.lineTo(x - 3, y - h + 24);
                ctx.lineTo(x, y - h + 28);
                ctx.lineTo(x + 3, y - h + 24);
                ctx.closePath();
                ctx.fill();

            } else {
                // Regular character
                // Head
                ctx.fillStyle = char.skin;
                ctx.fillRect(x - w/2 + 4, y - h + 4, w - 8, 12);

                // Hair
                ctx.fillStyle = char.hair;
                ctx.fillRect(x - w/2 + 4, y - h + 2, w - 8, 6);

                // Eyes - expression based on satisfaction
                ctx.fillStyle = '#202020';
                if (!char.isPlayer && char.leaving && char.satisfied) {
                    // Happy eyes (^ ^) for satisfied leaving
                    ctx.fillRect(x - w/2 + 8, y - h + 10, 3, 2);
                    ctx.fillRect(x + w/2 - 11, y - h + 10, 3, 2);
                } else if (!char.isPlayer && char.satisfactionLevel === 1) {
                    // Worried eyes for long wait
                    ctx.fillRect(x - w/2 + 8, y - h + 11, 3, 2);
                    ctx.fillRect(x + w/2 - 11, y - h + 11, 3, 2);
                } else {
                    // Normal eyes
                    ctx.fillRect(x - w/2 + 8, y - h + 10, 3, 3);
                    ctx.fillRect(x + w/2 - 11, y - h + 10, 3, 3);
                }

                // Mouth - expression based on satisfaction
                if (!char.isPlayer && char.leaving && char.satisfied) {
                    // Smile for satisfied
                    ctx.fillRect(x - 2, y - h + 14, 4, 1);
                } else if (!char.isPlayer && char.satisfactionLevel === 1) {
                    // Frown for long wait
                    ctx.fillRect(x - 2, y - h + 15, 4, 1);
                }

                // Body
                ctx.fillStyle = char.shirt;
                ctx.fillRect(x - w/2 + 2, y - h + 16, w - 4, 16);

                // Arms
                ctx.fillStyle = char.skin;
                ctx.fillRect(x - w/2 - 2, y - h + 18, 4, 10);
                ctx.fillRect(x + w/2 - 2, y - h + 18, 4, 10);
            }

            ctx.restore();
        }

        function drawOrderBubble(customer) {
            const bubbleX = customer.x;
            const bubbleY = customer.y - 60;
            const padding = 8;
            const cubeSize = 16;
            const spacing = 4;
            const totalWidth = customer.order.length * (cubeSize + spacing) - spacing + padding * 2;

            // Bubble background
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.roundRect(bubbleX - totalWidth/2, bubbleY - 15, totalWidth, 30, 4);
            ctx.fill();

            // Bubble tail
            ctx.beginPath();
            ctx.moveTo(bubbleX - 5, bubbleY + 15);
            ctx.lineTo(bubbleX + 5, bubbleY + 15);
            ctx.lineTo(bubbleX, bubbleY + 22);
            ctx.fill();

            // Draw ordered cubes
            let offsetX = bubbleX - totalWidth/2 + padding;
            for (const color of customer.order) {
                ctx.fillStyle = color;
                ctx.fillRect(offsetX, bubbleY - 8, cubeSize, cubeSize);

                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(offsetX, bubbleY - 8, cubeSize, 4);

                offsetX += cubeSize + spacing;
            }
        }

        function drawCube(cube) {
            const x = Math.floor(cube.x);
            const y = Math.floor(cube.y);
            const s = cube.size;

            // Main face
            ctx.fillStyle = cube.color;
            ctx.fillRect(x, y, s, s);

            // Highlight (top and left)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(x, y, s, 4);
            ctx.fillRect(x, y, 4, s);

            // Shadow (bottom and right)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(x, y + s - 4, s, 4);
            ctx.fillRect(x + s - 4, y, 4, s);
        }

        function drawAnimals() {
            for (const animal of game.animals) {
                ctx.fillStyle = animal.color;

                if (animal.type === 'bird') {
                    // Simple bird shape
                    const wingOffset = Math.sin(animal.phase * 3) * 3;
                    ctx.beginPath();
                    ctx.ellipse(animal.x, animal.y, 6, 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Wings
                    ctx.beginPath();
                    ctx.moveTo(animal.x - 4, animal.y);
                    ctx.lineTo(animal.x - 8, animal.y - 4 + wingOffset);
                    ctx.lineTo(animal.x - 2, animal.y);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(animal.x + 4, animal.y);
                    ctx.lineTo(animal.x + 8, animal.y - 4 + wingOffset);
                    ctx.lineTo(animal.x + 2, animal.y);
                    ctx.fill();
                } else if (animal.type === 'butterfly') {
                    const wingOpen = Math.abs(Math.sin(animal.phase * 4)) * 4;
                    ctx.beginPath();
                    ctx.ellipse(animal.x - wingOpen, animal.y, 4, 3, 0, 0, Math.PI * 2);
                    ctx.ellipse(animal.x + wingOpen, animal.y, 4, 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#403030';
                    ctx.fillRect(animal.x - 1, animal.y - 3, 2, 6);
                } else if (animal.type === 'cat') {
                    // Simple sitting cat
                    ctx.beginPath();
                    ctx.ellipse(animal.x, animal.y, 8, 6, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Head
                    ctx.beginPath();
                    ctx.arc(animal.x, animal.y - 8, 5, 0, Math.PI * 2);
                    ctx.fill();
                    // Ears
                    ctx.beginPath();
                    ctx.moveTo(animal.x - 5, animal.y - 10);
                    ctx.lineTo(animal.x - 3, animal.y - 15);
                    ctx.lineTo(animal.x - 1, animal.y - 10);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(animal.x + 5, animal.y - 10);
                    ctx.lineTo(animal.x + 3, animal.y - 15);
                    ctx.lineTo(animal.x + 1, animal.y - 10);
                    ctx.fill();
                    // Eyes (blink occasionally)
                    if (Math.sin(animal.phase * 0.5) > 0.95) {
                        ctx.fillStyle = '#303030';
                        ctx.fillRect(animal.x - 3, animal.y - 9, 2, 1);
                        ctx.fillRect(animal.x + 1, animal.y - 9, 2, 1);
                    } else {
                        ctx.fillStyle = '#303030';
                        ctx.fillRect(animal.x - 3, animal.y - 10, 2, 2);
                        ctx.fillRect(animal.x + 1, animal.y - 10, 2, 2);
                    }
                }
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            const audioInitActive = !document.getElementById('audio-init').classList.contains('hidden');

            if (audioInitActive && (e.key === 'Enter' || e.key === ' ')) {
                e.preventDefault();
                initGame();
                return;
            }
            if (e.key === 'm' || e.key === 'M') setMuted(!muted);
        });

        document.getElementById('mute-btn').addEventListener('click', () => setMuted(!muted));

        // Don't let a background tab register as a huge frame
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) lastFrameTime = performance.now();
        });

        // The stall remembers its keeper (shown before opening)
        (function () {
            document.getElementById('mute-btn').textContent = muted ? 'sound off' : 'sound on';
            if (save.daysTended > 0 || save.totalServed > 0) {
                document.getElementById('title-lifetime').textContent =
                    save.daysTended + ' day' + (save.daysTended === 1 ? '' : 's') + ' tended · ' +
                    save.totalServed + ' soul' + (save.totalServed === 1 ? '' : 's') + ' served · best streak ' + save.bestStreak;
            }
        })();
    </script>
</body>
